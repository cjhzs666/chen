<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>食物营养</title>
<style>
/* ========== 基础 ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
    --bg:#F2F2F7;--card:#FFFFFF;--primary:#34C759;--primary-dark:#30B350;
    --danger:#FF3B30;--text:#1C1C1E;--text2:#8E8E93;--text3:#AEAEB2;
    --sep:#E5E5EA;--fill:#F2F2F7;
    --kcal:#FF9500;--protein:#34C759;--fat:#FF3B30;--carbs:#007AFF;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
    --shadow-lg:0 10px 30px rgba(0,0,0,.08);
    --radius:16px;--radius-sm:12px;--radius-xs:8px;
    --tab-h:64px;
}
body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;
    min-height:100vh;min-height:100dvh;
    padding:52px 0 calc(var(--tab-h)+24px);
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
    -webkit-user-select:none;user-select:none;
}

/* ========== 顶部 ========== */
.nav-header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(242,242,247,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 16px;height:52px;border-bottom:.5px solid var(--sep);
}
.nav-title{font-size:1.1rem;font-weight:700;letter-spacing:-.2px;}
.nav-user{
    display:flex;align-items:center;gap:6px;
    background:var(--card);border:none;padding:6px 10px 6px 8px;border-radius:20px;
    cursor:pointer;font-size:.85rem;font-weight:600;
    box-shadow:var(--shadow);transition:all .2s;font-family:inherit;color:var(--text);
}
.nav-user:active{transform:scale(.96)}
.nav-user-avatar{
    width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;
}

/* ========== 底部 ========== */
.tab-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:center;height:var(--tab-h);padding:0 8px 20px;
    border-top:.5px solid var(--sep);
}
.tab-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    padding:4px 0;border:none;background:none;font-family:inherit;
    color:var(--text3);transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.tab-item.active{color:var(--primary)}
.tab-item svg{width:20px;height:20px}
.tab-label{font-size:.65rem;font-weight:500;letter-spacing:.2px}
.tab-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);opacity:0;transition:opacity .2s}
.tab-item.active .tab-dot{opacity:1}

/* ========== 内容区 ========== */
.tab-content{display:none;padding:16px 16px 0;max-width:480px;margin:0 auto;animation:fadeIn .25s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ========== 今日 Tab - 环形图 ========== */
.ring-section{display:flex;flex-direction:column;align-items:center;padding:20px 0 10px}
.ring-container{position:relative;width:200px;height:200px;margin-bottom:8px}
.ring-container svg{transform:rotate(-90deg)}
.ring-center{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-current{font-size:2.2rem;font-weight:800;letter-spacing:-1px;color:var(--text);line-height:1}
.ring-target{font-size:.85rem;color:var(--text2);margin-top:2px}
.ring-remaining{font-size:.9rem;font-weight:500;color:var(--text2);margin-top:4px}
.ring-remaining.over{color:var(--danger)}
.date-heading{font-size:.9rem;font-weight:600;color:var(--text2);margin-bottom:8px}

/* ========== 营养素条 ========== */
.macro-bars{width:100%;padding:0 4px;margin-bottom:16px}
.macro-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.macro-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.macro-color.p{background:var(--protein)}
.macro-color.f{background:var(--fat)}
.macro-color.c{background:var(--carbs)}
.macro-name{font-size:.82rem;font-weight:600;color:var(--text);width:40px}
.macro-track{flex:1;height:6px;border-radius:3px;background:var(--sep);overflow:hidden}
.macro-fill{height:100%;border-radius:3px;transition:width .5s ease}
.macro-fill.p{background:var(--protein)}
.macro-fill.f{background:var(--fat)}
.macro-fill.c{background:var(--carbs)}
.macro-val{font-size:.8rem;font-weight:600;color:var(--text2);text-align:right;white-space:nowrap}
.macro-goal{font-weight:400;color:var(--text3)}
.macro-pct{font-size:.75rem;font-weight:600;color:var(--text2);width:32px;text-align:right}
.macro-fill.over{background:var(--danger)!important}

/* ========== 添加按钮 ========== */
.add-btn{
    width:100%;padding:14px;border:none;border-radius:var(--radius-sm);
    background:var(--primary);color:#fff;font-size:1rem;font-weight:600;
    cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:all .2s;box-shadow:0 4px 16px rgba(52,199,89,.3);margin-bottom:20px;
}
.add-btn:active{transform:scale(.97);background:var(--primary-dark)}

/* ========== 食物列表 ========== */
.food-list-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:20px}
.fl-title{font-size:.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.fl-empty{text-align:center;padding:20px;color:var(--text3);font-size:.9rem}
.fl-item{
    display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:8px;
    border-radius:var(--radius-sm);background:var(--card);box-shadow:var(--shadow);
    border-left:4px solid var(--kcal);transition:all .2s;animation:flFadeIn .4s ease backwards;
}
.fl-item:nth-child(1){animation-delay:.05s}
.fl-item:nth-child(2){animation-delay:.1s}
.fl-item:nth-child(3){animation-delay:.15s}
.fl-item:nth-child(4){animation-delay:.2s}
.fl-item:nth-child(5){animation-delay:.25s}
.fl-item:nth-child(6){animation-delay:.3s}
.fl-item:nth-child(7){animation-delay:.35s}
.fl-item:nth-child(8){animation-delay:.4s}
.fl-item:active{transform:scale(.98)}
.fl-item.protein-heavy{border-left-color:var(--protein)}
.fl-item.fat-heavy{border-left-color:var(--fat)}
.fl-item.carbs-heavy{border-left-color:var(--carbs)}
@keyframes flFadeIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.fl-dot{display:none}
.fl-info{flex:1;min-width:0}
.fl-name{font-weight:700;font-size:.95rem;margin-bottom:2px}
.fl-meta{font-size:.76rem;color:var(--text3)}
.fl-kcal{font-weight:700;font-size:1.05rem;color:var(--text2);white-space:nowrap;text-align:right}
.fl-kcal strong{color:var(--kcal);font-size:1.15rem}
.fl-del{
    border:none;background:none;color:var(--text3);font-size:.85rem;cursor:pointer;
    padding:6px;transition:all .2s;width:28px;height:28px;display:flex;
    align-items:center;justify-content:center;border-radius:50%;opacity:.5;
}
.fl-del:hover{color:var(--danger);opacity:1;background:rgba(255,59,48,.08)}

/* ========== 历史 Tab ========== */
.hist-header{text-align:center;padding:8px;color:var(--text2);font-size:.9rem;font-weight:600;margin-bottom:8px}
.hist-empty{text-align:center;padding:40px;color:var(--text3);font-size:.95rem}
.hist-day{
    background:var(--card);border-radius:var(--radius-sm);margin-bottom:10px;
    box-shadow:var(--shadow);overflow:hidden;
}
.hist-day-hd{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 16px;cursor:pointer;transition:background .2s;user-select:none;
}
.hist-day-hd:active{background:var(--fill)}
.hist-date{font-weight:600;font-size:.92rem}
.hist-sum{font-size:.82rem;color:var(--text2);display:flex;gap:12px;align-items:center}
.hist-arrow{color:var(--text3);font-size:.65rem;transition:transform .2s}
.hist-day.open .hist-arrow{transform:rotate(180deg)}
.hist-day-bd{display:none;padding:0 16px 14px;border-top:.5px solid var(--sep)}
.hist-day.open .hist-day-bd{display:block}
.hist-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--sep);font-size:.85rem}
.hist-row:last-child{border-bottom:none}
.hi-time{color:var(--text3);width:38px;font-size:.78rem}
.hi-name{flex:1;font-weight:500}
.hi-w{color:var(--text2);font-size:.78rem}
.hi-k{font-weight:600;color:var(--kcal)}

/* ========== 底部弹出面板 ========== */
.sheet-overlay{
    position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;justify-content:center;
    transition:opacity .3s;
}
.sheet{
    background:#fff;border-radius:20px 20px 0 0;padding:0 20px 32px;
    width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
    animation:slideUp .35s cubic-bezier(.32,.72,0,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* 环形图动画 */
#ringProgress{transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .4s ease}
/* 营养素条动画 */
.macro-row{animation:macroIn .5s ease backwards}
.macro-row:nth-child(1){animation-delay:.1s}
.macro-row:nth-child(2){animation-delay:.2s}
.macro-row:nth-child(3){animation-delay:.3s}
@keyframes macroIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
/* 面板弹性动画 */
.sheet-overlay .sheet{animation:slideUpSpring .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUpSpring{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* 卡片入场 */
.card{animation:cardIn .5s ease backwards}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:var(--sep);margin:12px auto 20px}
.sheet-title{font-size:1.05rem;font-weight:700;text-align:center;margin-bottom:16px}

/* 搜索 */
.search-box{position:relative;margin-bottom:10px}
.search-box input{
    width:100%;padding:14px 14px 14px 38px;border:none;border-radius:var(--radius-xs);
    font-size:1rem;font-family:inherit;background:var(--fill);color:var(--text);
    -webkit-appearance:none;transition:background .2s;
}
.search-box input:focus{outline:none;background:#E8E8ED}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%)}

/* 分类 */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
    padding:7px 14px;border-radius:16px;font-size:.8rem;font-weight:500;
    white-space:nowrap;cursor:pointer;border:none;font-family:inherit;
    background:var(--fill);color:var(--text2);transition:all .2s;
    -webkit-tap-highlight-color:transparent;
}
.chip.active{background:var(--primary);color:#fff}
.chip:active{transform:scale(.95)}

/* 下拉 */
.dropdown-wrap{position:relative}
.dropdown{
    position:absolute;top:100%;left:0;right:0;z-index:50;
    background:#fff;border-radius:var(--radius-xs);max-height:240px;overflow-y:auto;
    display:none;box-shadow:var(--shadow-lg);margin-top:4px;
}
.dropdown.show{display:block}
.dd-item{
    padding:11px 14px;cursor:pointer;font-size:.92rem;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:.5px solid var(--sep);transition:background .15s;
}
.dd-item:last-child{border-bottom:none}
.dd-item:hover,.dd-item.active{background:rgba(52,199,89,.06)}
.dd-kcal{font-size:.78rem;color:var(--text3)}
.dd-cat{padding:5px 14px;font-size:.7rem;font-weight:600;color:var(--text3);letter-spacing:.5px;background:var(--fill)}
.dd-empty{padding:20px;text-align:center;color:var(--text3)}

/* 重量 */
.wt-section{margin-bottom:14px}
.wt-label{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:8px;display:block}
.wt-row{display:flex;gap:10px;align-items:center}
.wt-input{
    flex:1;padding:12px 14px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:1.05rem;font-family:inherit;text-align:center;font-weight:600;
    transition:border-color .2s;-webkit-appearance:none;color:var(--text);
}
.wt-input:focus{outline:none;border-color:var(--primary)}
.wt-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.wt-preset{
    padding:6px 12px;border-radius:14px;font-size:.78rem;font-family:inherit;
    font-weight:500;cursor:pointer;border:1px solid var(--sep);background:var(--card);
    color:var(--text2);transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.wt-preset:active{border-color:var(--primary);color:var(--primary);background:rgba(52,199,89,.05)}

/* 营养预览 */
.nut-preview{display:none;margin-bottom:14px}
.nut-preview.show{display:block}
.nut-hero{
    text-align:center;padding:16px;border-radius:var(--radius-sm);
    background:linear-gradient(135deg,#F2FFF5,#E8FFEE);
}
.nut-hero .big{font-size:2.4rem;font-weight:800;color:var(--kcal);letter-spacing:-1px;line-height:1}
.nut-hero .unit{font-size:.9rem;font-weight:500;color:var(--text2);margin-left:2px}
.nut-hero .desc{font-size:.85rem;color:var(--text2);margin-top:4px}
.nut-macros{display:flex;gap:8px;margin-top:8px}
.nut-macro{
    flex:1;text-align:center;padding:10px 4px;border-radius:var(--radius-xs);background:var(--fill);
}
.nut-macro .v{display:block;font-size:.95rem;font-weight:700}
.nut-macro .l{display:block;font-size:.68rem;color:var(--text2);margin-top:1px}
.nut-macro.p .v{color:var(--protein)}
.nut-macro.f .v{color:var(--fat)}
.nut-macro.c .v{color:var(--carbs)}

.sheet-confirm{
    width:100%;padding:14px;border:none;border-radius:var(--radius-sm);
    background:var(--primary);color:#fff;font-size:1rem;font-weight:600;
    cursor:pointer;font-family:inherit;transition:all .2s;
}
.sheet-confirm:active{transform:scale(.97);background:var(--primary-dark)}
.sheet-confirm:disabled{background:var(--sep);color:var(--text3);cursor:not-allowed}

/* ========== 弹窗 ========== */
.modal-overlay{
    position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.4);
    backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
    background:#fff;border-radius:20px 20px 0 0;padding:0 20px 32px;
    width:100%;max-width:480px;max-height:80vh;overflow-y:auto;
    animation:slideUp .35s cubic-bezier(.32,.72,0,1);
}
.modal-sheet h3{font-size:1rem;text-align:center;margin:16px 0}
.modal-sheet .handle{width:36px;height:5px;border-radius:3px;background:var(--sep);margin:12px auto}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:220px;overflow-y:auto}
.user-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;border-radius:var(--radius-xs);cursor:pointer;
    border:1.5px solid var(--sep);font-weight:600;transition:all .2s;
}
.user-item:hover{background:var(--fill)}
.user-item.cur{border-color:var(--primary);background:rgba(52,199,89,.04)}
.user-badge{font-size:.68rem;background:var(--primary);color:#fff;padding:2px 10px;border-radius:12px;font-weight:600}
.user-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.1rem}
.user-del:hover{color:var(--danger)}
.new-user-fm{display:flex;gap:8px;margin-bottom:14px}
.new-user-fm input{
    flex:1;padding:11px 14px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:.92rem;font-family:inherit;
}
.new-user-fm input:focus{outline:none;border-color:var(--primary)}

.goal-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.goal-row input{
    flex:1;padding:12px 16px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:1.1rem;font-family:inherit;text-align:center;font-weight:600;
}
.goal-row input:focus{outline:none;border-color:var(--primary)}
.goal-unit{font-size:.9rem;color:var(--text2);font-weight:500}

.btn{
    cursor:pointer;border:none;border-radius:var(--radius-xs);padding:12px 20px;
    font-size:.95rem;font-weight:600;transition:all .2s;display:flex;
    align-items:center;justify-content:center;gap:6px;font-family:inherit;width:100%;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-ghost{background:var(--fill);color:var(--text);padding:10px 16px;font-size:.88rem;width:auto;margin:0 auto;border-radius:20px}

/* ========== 身体评估表单 ========== */
.setup-section{margin-bottom:14px}
.setup-label{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.gender-toggle{display:flex;gap:8px}
.gender-opt{
    flex:1;padding:11px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    text-align:center;cursor:pointer;font-size:.92rem;font-family:inherit;font-weight:600;
    background:var(--card);color:var(--text2);transition:all .2s;
}
.gender-opt.active{border-color:var(--primary);color:var(--primary);background:rgba(52,199,89,.04)}
.setup-input-row{display:flex;gap:8px}
.setup-input-row input{
    flex:1;padding:11px 12px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:.95rem;font-family:inherit;text-align:center;font-weight:500;
    -webkit-appearance:none;color:var(--text);
}
.setup-input-row input:focus{outline:none;border-color:var(--primary)}
.setup-input-row .unit{display:flex;align-items:center;font-size:.85rem;color:var(--text2);font-weight:500;width:28px;justify-content:center}
.goal-chips{display:flex;gap:8px}
.goal-chip{
    flex:1;padding:12px 8px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    text-align:center;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;
    background:var(--card);color:var(--text2);transition:all .2s;
}
.goal-chip.active{border-color:var(--primary);color:var(--primary);background:rgba(52,199,89,.04)}
.goal-chip .emoji{font-size:1.3rem;display:block;margin-bottom:2px}
.setup-result{
    text-align:center;padding:16px;border-radius:var(--radius-sm);
    background:linear-gradient(135deg,#F2FFF5,#E8FFEE);margin-bottom:12px;display:none;
}
.setup-result.show{display:block}
.setup-result .rec-kcal{font-size:2rem;font-weight:800;color:var(--primary);line-height:1}
.setup-result .rec-label{font-size:.82rem;color:var(--text2);margin-top:4px}
.setup-result .rec-detail{font-size:.78rem;color:var(--text3);margin-top:2px}
.skip-link{text-align:center;padding:8px;color:var(--text3);font-size:.82rem;cursor:pointer;text-decoration:underline}

/* Toast */
.toast{
    position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
    background:#1C1C1E;color:#fff;padding:12px 24px;border-radius:20px;
    font-size:.88rem;z-index:300;font-weight:500;
    box-shadow:0 8px 32px rgba(0,0,0,.2);pointer-events:none;white-space:nowrap;
    animation:toastIn .3s ease,toastOut .3s ease 1.8s forwards;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.hidden{display:none!important}

/* 响应式 */
@media(max-width:400px){
    .tab-content{padding:12px 12px 0}
    .ring-container{width:170px;height:170px}
    .ring-current{font-size:1.8rem}
    .nut-hero .big{font-size:2rem}
}
</style>
</head>
<body>

<!-- ========== 顶部导航 ========== -->
<nav class="nav-header">
    <span class="nav-title">食物营养</span>
    <button class="nav-user" id="navUserBtn">
        <span class="nav-user-avatar" id="navAvatar">U</span>
        <span id="navUserName">用户</span>
    </button>
</nav>

<!-- ========== 今日 Tab ========== -->
<div class="tab-content active" id="tabToday">
    <div class="ring-section">
        <div class="date-heading" id="todayHeading"></div>
        <div class="ring-container">
            <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="none" stroke="#E5E5EA" stroke-width="14"/>

// ========== 用户 ==========
function initUser(){
    let u=getUsers();if(!u.length){u=['默认用户'];saveUsers(u);currUser='默认用户';setCurr(currUser);}
    if(!u.includes(currUser)){currUser=u[0];setCurr(currUser);}
    updateUserUI();loadRec();renderAll();
}
function updateUserUI(){D.navUserName.textContent=currUser;D.navAvatar.textContent=currUser[0].toUpperCase();}
function loadRec(){records=currUser?getRec(currUser):[];}
function switchUser(n){currUser=n;setCurr(n);updateUserUI();loadRec();renderAll();closeUserModal();toast('已切换到 '+n);}
function createUser(){
    const n=D.newUserName.value.trim();if(!n){toast('请输入用户名');return;}
    const u=getUsers();if(u.includes(n)){toast('该用户已存在');return;}
    u.push(n);saveUsers(u);D.newUserName.value='';
    switchUser(n);renderUserModal();closeUserModal();
    // 新用户打开身体评估
    setTimeout(()=>openProfileModal(),350);
}
function deleteUser(n){
    if(!confirm('确定删除「'+n+'」及所有记录？'))return;
    let u=getUsers().filter(x=>x!==n);saveUsers(u);
    localStorage.removeItem(SK+'rec_'+n);localStorage.removeItem(SK+'goal_'+n);localStorage.removeItem(SK+'prof_'+n);
    if(currUser===n){if(u.length){currUser=u[0];setCurr(currUser);updateUserUI();loadRec();}else{currUser='';setCurr('');initUser();}}
    renderUserModal();renderAll();
}

// ========== Tab ==========
function switchTab(id){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
    $(id).classList.add('active');
    document.querySelector(`[data-tab="${id}"]`).classList.add('active');
    if(id==='tabToday')renderToday();
    if(id==='tabUser')renderUserTab();
}
document.querySelectorAll('.tab-item').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

// ========== 分类标签 ==========
function renderChips(){
    D.categoryChips.innerHTML='<button class="chip active" data-cat="全部">全部</button>'+
        ALL_CATS.map(c=>`<button class="chip" data-cat="${c}">${c}</button>`).join('');
    D.categoryChips.querySelectorAll('.chip').forEach(ch=>{
        ch.addEventListener('click',()=>{
            D.categoryChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
            ch.classList.add('active');activeCat=ch.dataset.cat;
            D.foodSearch.value='';selFood=null;hideNutPreview();renderDropdown('');
            D.foodSearch.focus();
        });
    });
}

// ========== 搜索下拉 ==========
function renderDropdown(filter){
    D.foodDropdown.innerHTML='';const s=(filter||'').toLowerCase().trim();
    let list=FOOD_DB;if(activeCat!=='全部')list=list.filter(f=>f.category===activeCat);
    if(s)list=list.filter(f=>f.name.includes(s)||f.category.includes(s));
    if(!list.length){D.foodDropdown.innerHTML='<div class="dd-empty">未找到匹配的食物</div>';}
    else{
        const g={};list.forEach(f=>{if(!g[f.category])g[f.category]=[];g[f.category].push(f);});
        Object.keys(g).forEach(cat=>{
            const cd=document.createElement('div');cd.className='dd-cat';cd.textContent=cat;D.foodDropdown.appendChild(cd);
            g[cat].forEach(food=>{
                const it=document.createElement('div');it.className='dd-item';
                if(selFood===food)it.classList.add('active');
                it.innerHTML=`<span>${food.name}</span><span class="dd-kcal">${food.kcal} kcal/100g</span>`;
                it.addEventListener('mousedown',e=>{e.preventDefault();selectFood(food);});
                D.foodDropdown.appendChild(it);
            });
        });
    }
    D.foodDropdown.classList.add('show');
}
function selectFood(food){
    selFood=food;D.foodSearch.value=food.name;D.foodDropdown.classList.remove('show');
    calcNut();D.weightInput.focus();
}
function calcNut(){
    if(!selFood){hideNutPreview();return;}
    const w=parseFloat(D.weightInput.value);
    if(!w||w<=0){hideNutPreview();return;}
    const r=w/100;showNutPreview();
    D.nutKcal.textContent=(selFood.kcal*r).toFixed(1);
    D.nutDesc.textContent=selFood.name+' '+w+'g';
    D.nutProtein.textContent=(selFood.protein*r).toFixed(1);
    D.nutFat.textContent=(selFood.fat*r).toFixed(1);
    D.nutCarbs.textContent=(selFood.carbs*r).toFixed(1);
    D.confirmAddBtn.disabled=false;
}
function showNutPreview(){D.nutPreview.classList.add('show');}
function hideNutPreview(){D.nutPreview.classList.remove('show');D.confirmAddBtn.disabled=true;}

// ========== 添加面板 ==========
function openSheet(){
    D.addSheet.classList.remove('hidden');D.foodSearch.value='';D.weightInput.value='';
    selFood=null;activeCat='全部';hideNutPreview();
    renderChips();D.foodSearch.focus();
}
function closeSheet(){D.addSheet.classList.add('hidden');}
function confirmAdd(){
    if(!currUser){toast('请先选择用户');return;}
    if(!selFood){toast('请选择食物');return;}
    const w=parseFloat(D.weightInput.value);if(!w||w<=0){toast('请输入有效重量');return;}
    const r=w/100;
    records.push({
        id:genId(),date:today(),time:nowTime(),foodName:selFood.name,weight:w,
        kcal:parseFloat((selFood.kcal*r).toFixed(1)),protein:parseFloat((selFood.protein*r).toFixed(1)),
        fat:parseFloat((selFood.fat*r).toFixed(1)),carbs:parseFloat((selFood.carbs*r).toFixed(1)),
    });
    saveRec(currUser,records);closeSheet();
    renderAll();toast('已添加 '+selFood.name+' · '+w+'g');
}

// ========== 删除 ==========
function delRec(id){if(!confirm('删除这条记录？'))return;records=records.filter(r=>r.id!==id);saveRec(currUser,records);renderAll();}

// ========== 渲染 ==========
function renderAll(){
    renderToday();renderHistoryMini();
    if(currUser){
        D.userDisplayName.textContent=currUser;
        D.userAvatar.textContent=currUser[0].toUpperCase();
        D.userGoalDisplay.textContent=getGoal(currUser);
    }
}
function renderToday(){
    const td=today();D.todayHeading.textContent=dateLabel(td);
    const tr=records.filter(r=>r.date===td);
    const goal=getGoal(currUser);
    const tk=tr.reduce((s,r)=>s+r.kcal,0);
    const tp=tr.reduce((s,r)=>s+r.protein,0);
    const tf_=tr.reduce((s,r)=>s+r.fat,0);
    const tc=tr.reduce((s,r)=>s+r.carbs,0);

    // 环形图
    const circ=2*Math.PI*90;const pct=Math.min(tk/goal,1.5);
    const off=circ*(1-Math.min(pct,1));
    D.ringProgress.setAttribute('stroke-dasharray',circ);
    D.ringProgress.setAttribute('stroke-dashoffset',off);
    D.ringProgress.setAttribute('stroke',tk>goal?'#FF3B30':'#34C759');
    D.ringCurrent.textContent=Math.round(tk);
    D.ringTarget.textContent='目标 '+goal+' kcal';
    const rem=goal-tk;
    if(rem>0){D.ringRemaining.textContent='还差 '+Math.round(rem)+' kcal';D.ringRemaining.classList.remove('over');}
    else{D.ringRemaining.textContent='已超出 '+Math.round(-rem)+' kcal';D.ringRemaining.classList.add('over');}

    // 营养素条 — 按每日目标显示进度（上面已获取 goal）
    // 按标准饮食比例推算每日宏量目标：碳水55% 蛋白质18% 脂肪27%
    const goalCarbs=Math.round(goal*0.55/4);
    const goalProtein=Math.round(goal*0.18/4);
    const goalFat=Math.round(goal*0.27/9);
    function mbar(cls,name,grams,gTarget){
        const pct=Math.min(Math.round((grams/gTarget)*100),150);
        const w=Math.max(Math.min(pct,100),3);
        return`<div class="macro-row">
            <span class="macro-color ${cls}"></span><span class="macro-name">${name}</span>
            <div class="macro-track"><div class="macro-fill ${cls}" style="width:${w}%"></div></div>
            <span class="macro-val">${grams.toFixed(1)}<span class="macro-goal"> / ${gTarget}g</span></span>
            <span class="macro-pct">${pct}%</span>
        </div>`;
    }
    if(tr.length>0){
        D.macroBars.innerHTML=mbar('p','蛋白质',tp,goalProtein)+mbar('f','脂肪',tf_,goalFat)+mbar('c','碳水',tc,goalCarbs);
    }else{
        D.macroBars.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3);font-size:.85rem;"><div style="font-size:1.5rem;margin-bottom:4px;">—</div>添加食物后自动分析</div>';
    }

    // 食物列表
    D.todayFoodList.innerHTML=tr.length===0
        ?'<div class="fl-empty" style="padding:30px;"><div style="font-size:2.5rem;margin-bottom:10px;">🍽️</div><div style="font-weight:600;color:var(--text);margin-bottom:4px;">还没有记录</div><div style="font-size:.82rem;">点击上方按钮添加今天的第一餐吧</div></div>'
        :tr.map(r=>{
            const food=FOOD_DB.find(f=>f.name===r.foodName);
            const cat= food?food.category:'';
            let heavy='';
            if(r.protein>r.fat&&r.protein>r.carbs)heavy=' protein-heavy';
            else if(r.fat*2>r.carbs&&r.fat*2>r.protein)heavy=' fat-heavy';
            else heavy=' carbs-heavy';
            return`<div class="fl-item${heavy}">
                <div class="fl-info"><div class="fl-name">${r.foodName}</div><div class="fl-meta">${r.time} · ${r.weight}g${cat?' · '+cat:''}</div></div>
                <span class="fl-kcal"><strong>${r.kcal}</strong> kcal</span>
                <button class="fl-del" onclick="delRec('${r.id}')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg></button>
            </div>`;
        }).join('');

    // 设定目标按钮（点击环形图）
    D.ringProgress.parentElement.parentElement.style.cursor='pointer';
    D.ringProgress.parentElement.parentElement.onclick=openGoalModal;
}
function renderHistoryMini(){
    const td=today();const g={};
    records.forEach(r=>{if(r.date===td)return;if(!g[r.date])g[r.date]=[];g[r.date].push(r);});
    const dates=Object.keys(g).sort().reverse();
    if(!dates.length){D.historyEmptyMini.classList.remove('hidden');D.historyListMini.innerHTML='';return;}
    D.historyEmptyMini.classList.add('hidden');
    D.historyListMini.innerHTML=dates.slice(0,30).map(d=>{
        const rs=g[d];const tk=rs.reduce((s,r)=>s+r.kcal,0);
        return`<div class="hist-day">
            <div class="hist-day-hd" onclick="this.parentElement.classList.toggle('open')">
                <span class="hist-date">${dateLabel(d)}</span>
                <div class="hist-sum"><span>${rs.length}项 · ${tk.toFixed(0)}kcal</span><span class="hist-arrow">&#9660;</span></div>
            </div>
            <div class="hist-day-bd">${rs.map(r=>`<div class="hist-row"><span class="hi-time">${r.time}</span><span class="hi-name">${r.foodName}</span><span class="hi-w">${r.weight}g</span><span class="hi-k">${r.kcal} kcal</span></div>`).join('')}</div>
        </div>`;
    }).join('');
}

function renderUserTab(){
    if(!currUser)return;
    D.userAvatar.textContent=currUser[0].toUpperCase();
    D.userDisplayName.textContent=currUser;
    D.userGoalDisplay.textContent=getGoal(currUser);
    const p=getProfile(currUser);
    if(p){
        const actLabels={sedentary:'久坐不动',light:'轻度活动',moderate:'中度活动',active:'高度活动',very_active:'极高活动'};
        const goalLabels={lose:'减脂',maintain:'保持健康',gain:'增肌'};
        D.profileInfo.innerHTML=`
            <div style="display:flex;justify-content:center;gap:20px;margin-bottom:4px;">
                <span>${p.gender==='male'?'男':'女'} · ${p.age||'?'}岁</span>
                <span>${p.height||'?'}cm · ${p.weight||'?'}kg</span>
            </div>
            <div style="text-align:center;color:var(--text3);font-size:.82rem;">${actLabels[p.activity]||''} · ${goalLabels[p.goal]||''}</div>`;
    }else{
        D.profileInfo.innerHTML='<div style="text-align:center;padding:12px;color:var(--text3);">未评估 · 点击下方开始</div>';
    }
    renderHistoryMini();
}

// ========== 弹窗 ==========
function openUserModal(){D.userModal.classList.remove('hidden');renderUserModal();D.newUserName.focus();}
function closeUserModal(){D.userModal.classList.add('hidden');}
function renderUserModal(){
    D.userList.innerHTML=getUsers().map(n=>`<div class="user-item${n===currUser?' cur':''}" onclick="switchUser('${n}')">
        <span>${n}</span><div style="display:flex;align-items:center;gap:8px;">
        ${n===currUser?'<span class="user-badge">当前</span>':''}
        <button class="user-del" onclick="event.stopPropagation();deleteUser('${n}')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="3" width="12" height="10" rx="1"/><path d="M4 3V1.5h6V3"/></svg></button>
    </div></div>`).join('');
}
function openGoalModal(){
    if(!getProfile(currUser)){openProfileModal();return;}
    D.goalModal.classList.remove('hidden');D.goalInput.value=getGoal(currUser);D.goalInput.focus();
}
function closeGoalModal(){D.goalModal.classList.add('hidden');}
function saveGoal(){
    const g=parseInt(D.goalInput.value);if(!g||g<500||g>10000){toast('请输入500-10000之间的值');return;}
    saveGoal(currUser,g);closeGoalModal();renderToday();toast('每日目标已设为 '+g+' kcal');
}

// ========== 事件 ==========
$('navUserBtn').addEventListener('click',openUserModal);
$('closeUserModalBtn').addEventListener('click',closeUserModal);
$('userModal').addEventListener('click',e=>{if(e.target===$('userModal'))closeUserModal();});
$('createUserBtn').addEventListener('click',createUser);
$('newUserName').addEventListener('keydown',e=>{if(e.key==='Enter')createUser();});

$('switchUserFromTab').addEventListener('click',openUserModal);
$('reAssessBtn').addEventListener('click',()=>openProfileModal(getProfile(currUser)));
$('editGoalFromUser').addEventListener('click',()=>{
    if(!getProfile(currUser)){openProfileModal();return;}
    openGoalModal();
});

$('openSheetBtn').addEventListener('click',openSheet);
$('addSheet').addEventListener('click',e=>{if(e.target===$('addSheet'))closeSheet();});
$('confirmAddBtn').addEventListener('click',confirmAdd);

$('goalModal').addEventListener('click',e=>{if(e.target===$('goalModal'))closeGoalModal();});
$('closeGoalModalBtn').addEventListener('click',closeGoalModal);
$('saveGoalBtn').addEventListener('click',saveGoal);
$('goalInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveGoal();});
$('reopenProfileBtn').addEventListener('click',()=>{closeGoalModal();setTimeout(()=>openProfileModal(getProfile(currUser)),300);});

D.foodSearch.addEventListener('focus',()=>renderDropdown(D.foodSearch.value));
D.foodSearch.addEventListener('input',()=>{selFood=null;hideNutPreview();renderDropdown(D.foodSearch.value);});
D.foodSearch.addEventListener('keydown',e=>{if(e.key==='Escape')D.foodDropdown.classList.remove('show');});
D.weightInput.addEventListener('input',calcNut);
D.weightInput.addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});
document.querySelectorAll('.wt-preset').forEach(b=>b.addEventListener('click',()=>{D.weightInput.value=b.dataset.w;calcNut();}));
document.addEventListener('click',e=>{if(!D.foodSearch.contains(e.target)&&!D.foodDropdown.contains(e.target))D.foodDropdown.classList.remove('show');});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(!$('userModal').classList.contains('hidden'))closeUserModal();if(!$('goalModal').classList.contains('hidden'))closeGoalModal();if(!$('addSheet').classList.contains('hidden'))closeSheet();if(!$('profileModal').classList.contains('hidden'))closeProfileModal();}});

// ========== 身体评估 ==========
let profileGender='male',profileActivity='sedentary',profileGoal='lose';

function openProfileModal(existing){
    existing=existing||null;
    D.profileModal.classList.remove('hidden');
    D.setupResult.classList.remove('show');
    if(existing){
        D.pfAge.value=existing.age||'';D.pfHeight.value=existing.height||'';D.pfWeight.value=existing.weight||'';
        profileGender=existing.gender||'male';profileActivity=existing.activity||'sedentary';profileGoal=existing.goal||'lose';
    }else{
        D.pfAge.value='';D.pfHeight.value='';D.pfWeight.value='';
        profileGender='male';profileActivity='sedentary';profileGoal='lose';
    }
    document.querySelectorAll('#genderToggle .gender-opt').forEach(b=>{b.classList.toggle('active',b.dataset.g===profileGender);});
    document.querySelectorAll('#activityChips .goal-chip').forEach(b=>{b.classList.toggle('active',b.dataset.act===profileActivity);});
    document.querySelectorAll('#goalChips .goal-chip').forEach(b=>{b.classList.toggle('active',b.dataset.gl===profileGoal);});
    if(existing){calcTDEE();}
    D.pfAge.focus();
}
function closeProfileModal(){D.profileModal.classList.add('hidden');}

function calcTDEE(){
    const age=parseInt(D.pfAge.value),height=parseInt(D.pfHeight.value),weight=parseInt(D.pfWeight.value);
    if(!age||!height||!weight||age<10||height<100||weight<30)return;
    // Mifflin-St Jeor 公式
    let bmr=10*weight+6.25*height-5*age;
    bmr+=(profileGender==='male')?5:-161;
    const actFactors={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
    const tdee=Math.round(bmr*(actFactors[profileActivity]||1.2));
    // 目标调整
    const adj={lose:-500,maintain:0,gain:300};
    const rec=Math.max(tdee+(adj[profileGoal]||0),1200);
    const goalLabels={lose:'减脂',maintain:'保持健康',gain:'增肌'};
    const actLabels={sedentary:'久坐',light:'轻度活动',moderate:'中度活动',active:'高度活动',very_active:'极高活动'};

    D.recKcal.textContent=rec;
    D.recDetail.textContent='TDEE '+tdee+' kcal · '+goalLabels[profileGoal]+' · '+actLabels[profileActivity];
    D.setupResult.classList.add('show');
    // 暂存推荐值
    D.recKcal.dataset.value=rec;
}

// 性别/活动/目标选择器
document.querySelectorAll('#genderToggle .gender-opt').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('#genderToggle .gender-opt').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');profileGender=b.dataset.g;calcTDEE();
    });
});
document.querySelectorAll('#activityChips .goal-chip').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('#activityChips .goal-chip').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');profileActivity=b.dataset.act;calcTDEE();
    });
});
document.querySelectorAll('#goalChips .goal-chip').forEach(b=>{
    b.addEventListener('click',()=>{
        document.querySelectorAll('#goalChips .goal-chip').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');profileGoal=b.dataset.gl;calcTDEE();
    });
});
[D.pfAge,D.pfHeight,D.pfWeight].forEach(el=>el.addEventListener('input',calcTDEE));

$('saveProfileBtn').addEventListener('click',()=>{
    const rec=parseInt(D.recKcal.dataset.value)||2000;
    const p={gender:profileGender,age:parseInt(D.pfAge.value),height:parseInt(D.pfHeight.value),
        weight:parseInt(D.pfWeight.value),activity:profileActivity,goal:profileGoal};
    saveProfile(currUser,p);saveGoal(currUser,rec);
    closeProfileModal();
    renderAll();toast('每日目标已设为 '+rec+' kcal');
});
$('skipProfile').addEventListener('click',()=>{closeProfileModal();});
$('profileModal').addEventListener('click',e=>{if(e.target===$('profileModal'))closeProfileModal();});

// ========== 初始化 ==========
initUser();
// 如果是全新用户（无记录、无评估），首次自动弹出身体评估
if(currUser && !getProfile(currUser) && records.length===0){
    setTimeout(()=>openProfileModal(),500);
}
</script>
