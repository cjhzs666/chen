<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>食物营养</title>
<style>
/* ========== 基础 ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
    --bg:#F2F7F2;--card:#FFFFFF;--primary:#4A8C5C;--primary-dark:#3D7A4D;
    --danger:#E07050;--text:#2D4A32;--text2:#6B8F6B;--text3:#A0B8A0;
    --sep:#C8DCC8;--fill:#E8F0E8;
    --kcal:#FF8C42;--protein:#5B9A6B;--fat:#E07050;--carbs:#5B8DAD;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
    --shadow-lg:0 10px 30px rgba(0,0,0,.08);
    --radius:16px;--radius-sm:12px;--radius-xs:8px;
    --tab-h:64px;
    --meal-bf:#FFB347;--meal-lu:#FF8C42;--meal-dn:#7B6FAA;--meal-sk:#A0B8A0;
}
body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;
    min-height:100vh;min-height:100dvh;
    padding:52px 0 calc(var(--tab-h)+24px);
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
    -webkit-user-select:none;user-select:none;
}

/* ========== 顶部 ========== */
.nav-header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(242,247,242,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 16px;height:52px;border-bottom:.5px solid var(--sep);
}
.nav-title{font-size:1.1rem;font-weight:700;letter-spacing:-.2px;}
.nav-user{
    display:flex;align-items:center;gap:6px;
    background:var(--card);border:none;padding:6px 10px 6px 8px;border-radius:20px;
    cursor:pointer;font-size:.85rem;font-weight:600;
    box-shadow:var(--shadow);transition:all .2s;font-family:inherit;color:var(--text);
}
.nav-user:active{transform:scale(.96)}
.nav-user-avatar{
    width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;
}

/* ========== 底部 ========== */
.tab-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;align-items:center;height:var(--tab-h);padding:0 8px 20px;
    border-top:.5px solid var(--sep);
}
.tab-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    padding:4px 0;border:none;background:none;font-family:inherit;
    color:var(--text3);transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.tab-item.active{color:var(--primary)}
.tab-item svg{width:20px;height:20px}
.tab-label{font-size:.65rem;font-weight:500;letter-spacing:.2px}
.tab-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);opacity:0;transition:opacity .2s}
.tab-item.active .tab-dot{opacity:1}

/* ========== 内容区 ========== */
.tab-content{display:none;padding:16px 16px 0;max-width:480px;margin:0 auto;animation:fadeIn .25s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ========== 今日 - 紧凑环形图+营养素 ========== */
.dashboard-row{
    background:var(--card);border-radius:var(--radius);padding:14px 16px;
    box-shadow:var(--shadow);margin-bottom:12px;
    display:flex;align-items:center;gap:16px;cursor:pointer;
    transition:all .2s;
}
.dashboard-row:active{transform:scale(.98)}
.dash-ring{position:relative;width:90px;height:90px;flex-shrink:0}
.dash-ring svg{transform:rotate(-90deg)}
#ringProgress{transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .4s ease}
.dash-ring-center{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.dash-current{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;color:var(--text);line-height:1}
.dash-target{font-size:.6rem;color:var(--text2);margin-top:1px}
.dash-bars{flex:1;min-width:0}
.dash-macro{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.68rem}
.dash-macro:last-child{margin-bottom:0}
.dash-m-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dash-m-dot.p{background:var(--protein)}
.dash-m-dot.f{background:var(--fat)}
.dash-m-dot.c{background:var(--carbs)}
.dash-m-label{width:28px;font-weight:600;color:var(--text);flex-shrink:0}
.dash-m-track{flex:1;height:5px;border-radius:3px;background:var(--sep);overflow:hidden}
.dash-m-fill{height:100%;border-radius:3px;transition:width .5s ease}
.dash-m-fill.p{background:var(--protein)}
.dash-m-fill.f{background:var(--fat)}
.dash-m-fill.c{background:var(--carbs)}
.dash-m-fill.over{background:var(--danger)!important}
.dash-m-pct{width:30px;text-align:right;font-weight:600;color:var(--text2);flex-shrink:0;font-size:.65rem}
.dash-hint{text-align:center;font-size:.7rem;color:var(--text3);margin-top:2px}

/* ========== 餐次卡片 ========== */
.meal-card{
    background:var(--card);border-radius:var(--radius-sm);margin-bottom:10px;
    box-shadow:var(--shadow);overflow:hidden;animation:cardIn .5s ease backwards;
}
.meal-card:nth-child(1){animation-delay:0s}
.meal-card:nth-child(2){animation-delay:.08s}
.meal-card:nth-child(3){animation-delay:.16s}
.meal-card:nth-child(4){animation-delay:.24s}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.meal-hd{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;cursor:default;user-select:none;
}
.meal-hd-left{display:flex;align-items:center;gap:8px}
.meal-icon{font-size:1.2rem}
.meal-label{font-weight:700;font-size:.9rem;color:var(--text)}
.meal-kcal{font-size:.78rem;color:var(--text2);font-weight:600}
.meal-body{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.meal-tag{
    display:inline-flex;align-items:center;gap:4px;
    background:var(--fill);padding:5px 10px;border-radius:14px;
    font-size:.73rem;font-weight:500;color:var(--text);
    cursor:pointer;transition:all .15s;
    animation:tagIn .3s ease backwards;
}
.meal-tag:nth-child(1){animation-delay:0s}
.meal-tag:nth-child(2){animation-delay:.05s}
.meal-tag:nth-child(3){animation-delay:.1s}
.meal-tag:nth-child(4){animation-delay:.15s}
.meal-tag:nth-child(5){animation-delay:.2s}
@keyframes tagIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.meal-tag:active{background:#d8e8d8;transform:scale(.95)}
.meal-tag-x{font-size:.65rem;color:var(--text3);margin-left:1px}
.meal-add{
    display:inline-flex;align-items:center;gap:3px;
    background:none;border:1.5px dashed var(--sep);color:var(--text3);
    padding:5px 12px;border-radius:14px;font-size:.73rem;font-family:inherit;
    cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.meal-add:hover,.meal-add:active{border-color:var(--primary);color:var(--primary);background:rgba(74,140,92,.04)}
.meal-empty{font-size:.73rem;color:var(--text3)}

/* ========== 浮动添加按钮 ========== */
.float-add{
    width:100%;padding:12px;border:none;border-radius:var(--radius-sm);
    background:var(--primary);color:#fff;font-size:.95rem;font-weight:600;
    cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:all .2s;box-shadow:0 4px 16px rgba(74,140,92,.3);margin-bottom:16px;
}
.float-add:active{transform:scale(.97);background:var(--primary-dark)}

/* ========== 用户卡片 ========== */
.card{background:var(--card);border-radius:var(--radius-sm);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;animation:cardIn .5s ease backwards}
.card-header{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:8px}

/* ========== 历史 ========== */
.hist-empty{text-align:center;padding:40px;color:var(--text3);font-size:.95rem}
.hist-day{background:var(--card);border-radius:var(--radius-sm);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.hist-day-hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;transition:background .2s;user-select:none}
.hist-day-hd:active{background:var(--fill)}
.hist-date{font-weight:600;font-size:.92rem}
.hist-sum{font-size:.82rem;color:var(--text2);display:flex;gap:12px;align-items:center}
.hist-arrow{color:var(--text3);font-size:.65rem;transition:transform .2s}
.hist-day.open .hist-arrow{transform:rotate(180deg)}
.hist-day-bd{display:none;padding:0 16px 14px;border-top:.5px solid var(--sep)}
.hist-day.open .hist-day-bd{display:block}
.hist-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--sep);font-size:.85rem}
.hist-row:last-child{border-bottom:none}
.hi-time{color:var(--text3);width:38px;font-size:.78rem}
.hi-name{flex:1;font-weight:500}
.hi-w{color:var(--text2);font-size:.78rem}
.hi-k{font-weight:600;color:var(--kcal)}

/* ========== 底部弹出面板 ========== */
.sheet-overlay{
    position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;justify-content:center;
    transition:opacity .3s;
}
.sheet{
    background:#fff;border-radius:20px 20px 0 0;padding:0 20px 32px;
    width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
    animation:slideUpSpring .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUpSpring{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:var(--sep);margin:12px auto 16px}
.sheet-title{font-size:1rem;font-weight:700;text-align:center;margin-bottom:12px}

/* 最近常吃 */
.recent-section{margin-bottom:10px}
.recent-label{font-size:.7rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.recent-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.recent-row::-webkit-scrollbar{display:none}
.recent-pill{
    flex-shrink:0;background:var(--fill);border:1.5px solid var(--sep);
    padding:8px 12px;border-radius:16px;text-align:center;cursor:pointer;
    font-family:inherit;transition:all .2s;-webkit-tap-highlight-color:transparent;
    min-width:56px;
}
.recent-pill:hover,.recent-pill:active{border-color:var(--primary);background:#E0F0E0}
.recent-pill .emoji{font-size:1.1rem;display:block;margin-bottom:1px}
.recent-pill .name{font-size:.65rem;font-weight:600;color:var(--text);white-space:nowrap}
.recent-pill .sub{font-size:.58rem;color:var(--text3);white-space:nowrap}
.recent-none{font-size:.75rem;color:var(--text3);padding:8px 0;text-align:center}

/* 搜索 */
.search-box{position:relative;margin-bottom:8px}
.search-box input{
    width:100%;padding:12px 12px 12px 34px;border:none;border-radius:var(--radius-xs);
    font-size:.95rem;font-family:inherit;background:var(--fill);color:var(--text);
    -webkit-appearance:none;transition:background .2s;
}
.search-box input:focus{outline:none;background:#DCE8DC}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%)}

/* 下拉 */
.dropdown-wrap{position:relative}
.dropdown{
    position:absolute;top:100%;left:0;right:0;z-index:50;
    background:#fff;border-radius:var(--radius-xs);max-height:200px;overflow-y:auto;
    display:none;box-shadow:var(--shadow-lg);margin-top:4px;
}
.dropdown.show{display:block}
.dd-item{
    padding:10px 12px;cursor:pointer;font-size:.88rem;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:.5px solid var(--sep);transition:background .15s;
}
.dd-item:last-child{border-bottom:none}
.dd-item:hover,.dd-item.active{background:rgba(74,140,92,.06)}
.dd-kcal{font-size:.73rem;color:var(--text3)}
.dd-cat{padding:5px 12px;font-size:.68rem;font-weight:600;color:var(--text3);letter-spacing:.5px;background:var(--fill)}
.dd-empty{padding:20px;text-align:center;color:var(--text3)}

/* 分类 */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
    padding:6px 12px;border-radius:14px;font-size:.75rem;font-weight:500;
    white-space:nowrap;cursor:pointer;border:none;font-family:inherit;
    background:var(--fill);color:var(--text2);transition:all .2s;
    -webkit-tap-highlight-color:transparent;
}
.chip.active{background:var(--primary);color:#fff}
.chip:active{transform:scale(.95)}

/* 份量网格 */
.portion-section{margin-bottom:10px}
.portion-label{font-size:.72rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.portion-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.portion-btn{
    padding:11px 8px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    text-align:center;cursor:pointer;font-family:inherit;background:var(--card);
    transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.portion-btn .main{display:block;font-size:.82rem;font-weight:700;color:var(--text)}
.portion-btn .sub{display:block;font-size:.65rem;color:var(--text3);margin-top:1px}
.portion-btn:active,.portion-btn.selected{border-color:var(--primary);background:rgba(74,140,92,.05)}
.portion-btn.selected .main{color:var(--primary)}

/* 手动重量 */
.wt-section{margin-bottom:10px}
.wt-label{font-size:.7rem;font-weight:600;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.wt-row{display:flex;gap:8px;align-items:center}
.wt-input{
    width:80px;padding:8px 10px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:.9rem;font-family:inherit;text-align:center;font-weight:600;
    transition:border-color .2s;-webkit-appearance:none;color:var(--text);
}
.wt-input:focus{outline:none;border-color:var(--primary)}
.wt-presets{display:flex;gap:5px;flex-wrap:wrap}
.wt-preset{
    padding:5px 10px;border-radius:12px;font-size:.7rem;font-family:inherit;
    font-weight:500;cursor:pointer;border:1px solid var(--sep);background:var(--card);
    color:var(--text2);transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.wt-preset:active,.wt-preset.selected{border-color:var(--primary);color:var(--primary);background:rgba(74,140,92,.05)}

/* 营养预览 */
.nut-preview{display:none;margin-bottom:10px}
.nut-preview.show{display:block}
.nut-hero{
    text-align:center;padding:12px;border-radius:var(--radius-sm);
    background:linear-gradient(135deg,#F2F7F2,#E0EDE0);
}
.nut-hero .big{font-size:2rem;font-weight:800;color:var(--kcal);letter-spacing:-1px;line-height:1}
.nut-hero .unit{font-size:.8rem;font-weight:500;color:var(--text2);margin-left:2px}
.nut-hero .desc{font-size:.78rem;color:var(--text2);margin-top:2px}
.nut-macros{display:flex;gap:6px;margin-top:6px}
.nut-macro{
    flex:1;text-align:center;padding:8px 4px;border-radius:var(--radius-xs);background:var(--fill);
}
.nut-macro .v{display:block;font-size:.85rem;font-weight:700}
.nut-macro .l{display:block;font-size:.63rem;color:var(--text2);margin-top:1px}
.nut-macro.p .v{color:var(--protein)}
.nut-macro.f .v{color:var(--fat)}
.nut-macro.c .v{color:var(--carbs)}

/* 确认按钮 */
.sheet-confirm{
    width:100%;padding:13px;border:none;border-radius:var(--radius-sm);
    background:var(--primary);color:#fff;font-size:.95rem;font-weight:600;
    cursor:pointer;font-family:inherit;transition:all .2s;
}
.sheet-confirm:active{transform:scale(.97);background:var(--primary-dark)}
.sheet-confirm:disabled{background:var(--sep);color:var(--text3);cursor:not-allowed}

/* ========== 弹窗 ========== */
.modal-overlay{
    position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.4);
    backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
    background:#fff;border-radius:20px 20px 0 0;padding:0 20px 32px;
    width:100%;max-width:480px;max-height:80vh;overflow-y:auto;
    animation:slideUp .35s cubic-bezier(.32,.72,0,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet h3{font-size:1rem;text-align:center;margin:16px 0}
.modal-sheet .handle{width:36px;height:5px;border-radius:3px;background:var(--sep);margin:12px auto}
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:220px;overflow-y:auto}
.user-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;border-radius:var(--radius-xs);cursor:pointer;
    border:1.5px solid var(--sep);font-weight:600;transition:all .2s;
}
.user-item:hover{background:var(--fill)}
.user-item.cur{border-color:var(--primary);background:rgba(74,140,92,.04)}
.user-badge{font-size:.68rem;background:var(--primary);color:#fff;padding:2px 10px;border-radius:12px;font-weight:600}
.user-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.1rem}
.user-del:hover{color:var(--danger)}
.new-user-fm{display:flex;gap:8px;margin-bottom:14px}
.new-user-fm input{
    flex:1;padding:11px 14px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:.92rem;font-family:inherit;
}
.new-user-fm input:focus{outline:none;border-color:var(--primary)}

.goal-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.goal-row input{
    flex:1;padding:12px 16px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:1.1rem;font-family:inherit;text-align:center;font-weight:600;
}
.goal-row input:focus{outline:none;border-color:var(--primary)}
.goal-unit{font-size:.9rem;color:var(--text2);font-weight:500}

.btn{
    cursor:pointer;border:none;border-radius:var(--radius-xs);padding:12px 20px;
    font-size:.95rem;font-weight:600;transition:all .2s;display:flex;
    align-items:center;justify-content:center;gap:6px;font-family:inherit;width:100%;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-ghost{background:var(--fill);color:var(--text);padding:10px 16px;font-size:.88rem;width:auto;margin:0 auto;border-radius:20px}

/* ========== 身体评估 ========== */
.setup-section{margin-bottom:14px}
.setup-label{font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.gender-toggle{display:flex;gap:8px}
.gender-opt{
    flex:1;padding:11px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    text-align:center;cursor:pointer;font-size:.92rem;font-family:inherit;font-weight:600;
    background:var(--card);color:var(--text2);transition:all .2s;
}
.gender-opt.active{border-color:var(--primary);color:var(--primary);background:rgba(74,140,92,.04)}
.setup-input-row{display:flex;gap:8px}
.setup-input-row input{
    flex:1;padding:11px 12px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    font-size:.95rem;font-family:inherit;text-align:center;font-weight:500;
    -webkit-appearance:none;color:var(--text);
}
.setup-input-row input:focus{outline:none;border-color:var(--primary)}
.setup-input-row .unit{display:flex;align-items:center;font-size:.85rem;color:var(--text2);font-weight:500;width:28px;justify-content:center}
.goal-chips{display:flex;gap:8px}
.goal-chip{
    flex:1;padding:12px 8px;border:2px solid var(--sep);border-radius:var(--radius-xs);
    text-align:center;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;
    background:var(--card);color:var(--text2);transition:all .2s;
}
.goal-chip.active{border-color:var(--primary);color:var(--primary);background:rgba(74,140,92,.04)}
.goal-chip .emoji{font-size:1.3rem;display:block;margin-bottom:2px}
.setup-result{
    text-align:center;padding:16px;border-radius:var(--radius-sm);
    background:linear-gradient(135deg,#F2F7F2,#E0EDE0);margin-bottom:12px;display:none;
}
.setup-result.show{display:block}
.setup-result .rec-kcal{font-size:2rem;font-weight:800;color:var(--primary);line-height:1}
.setup-result .rec-label{font-size:.82rem;color:var(--text2);margin-top:4px}
.setup-result .rec-detail{font-size:.78rem;color:var(--text3);margin-top:2px}

/* Toast */
.toast{

    font-size:.88rem;z-index:300;font-weight:500;

    animation:toastIn .3s ease,toastOut .3s ease 1.8s forwards;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
.hidden{display:none!important}

// ========== 数据 ==========
const SK='nc2_';
function getUsers(){try{return JSON.parse(localStorage.getItem(SK+'users'))||[]}catch{return[]}}
function saveUsers(u){localStorage.setItem(SK+'users',JSON.stringify(u))}
function getCurr(){return localStorage.getItem(SK+'curr')||''}
function setCurr(n){localStorage.setItem(SK+'curr',n)}
function getRec(u){try{return JSON.parse(localStorage.getItem(SK+'rec_'+u))||[]}catch{return[]}}
function saveRec(u,r){localStorage.setItem(SK+'rec_'+u,JSON.stringify(r))}
function getGoal(u){const g=parseInt(localStorage.getItem(SK+'goal_'+u));return(g&&g>0)?g:2000}
function saveGoal(u,g){localStorage.setItem(SK+'goal_'+u,g)}
function getProfile(u){try{return JSON.parse(localStorage.getItem(SK+'prof_'+u))||null}catch{return null}}
function saveProfile(u,p){localStorage.setItem(SK+'prof_'+u,JSON.stringify(p))}
function getFreq(u){try{return JSON.parse(localStorage.getItem(SK+'freq_'+u))||{}}catch{return{}}}
function addFreq(u,foodName){const f=getFreq(u);f[foodName]=(f[foodName]||0)+1;localStorage.setItem(SK+'freq_'+u,JSON.stringify(f));}
function getRecentFoods(u,n=6){const f=getFreq(u);return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([name])=>FOOD_DB.find(fd=>fd.name===name)).filter(Boolean);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function nowTime(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function dateLabel(s){const[p,y,m,d]=[s.split('-'),...s.split('-')].slice(0,4);const dt=new Date(+y,+m-1,+d);return m+'月'+d+'日 '+['周日','周一','周二','周三','周四','周五','周六'][dt.getDay()];}
function autoMeal(t){if(!t){const h=new Date().getHours();if(h>=5&&h<10)return'breakfast';if(h>=10&&h<14)return'lunch';if(h>=14&&h<17)return'snack';if(h>=17&&h<22)return'dinner';return'snack';}const h=parseInt(t.split(':')[0]);if(h>=5&&h<10)return'breakfast';if(h>=10&&h<14)return'lunch';if(h>=14&&h<17)return'snack';if(h>=17&&h<22)return'dinner';return'snack';}

// ========== 用户 ==========
function initUser(){let u=getUsers();if(!u.length){u=['默认用户'];saveUsers(u);currUser='默认用户';setCurr(currUser);}if(!u.includes(currUser)){currUser=u[0];setCurr(currUser);}updateUserUI();loadRec();renderAll();}
function updateUserUI(){D.navUserName.textContent=currUser;D.navAvatar.textContent=currUser[0].toUpperCase();}
function loadRec(){records=currUser?getRec(currUser):[];}
function switchUser(n){currUser=n;setCurr(n);updateUserUI();loadRec();renderAll();closeUserModal();toast('已切换到 '+n);}
function createUser(){const n=D.newUserName.value.trim();if(!n){toast('请输入用户名');return;}const u=getUsers();if(u.includes(n)){toast('该用户已存在');return;}u.push(n);saveUsers(u);D.newUserName.value='';switchUser(n);renderUserModal();closeUserModal();setTimeout(()=>openProfileModal(),350);}
function deleteUser(n){if(!confirm('确定删除「'+n+'」及所有记录？'))return;let u=getUsers().filter(x=>x!==n);saveUsers(u);localStorage.removeItem(SK+'rec_'+n);localStorage.removeItem(SK+'goal_'+n);localStorage.removeItem(SK+'prof_'+n);localStorage.removeItem(SK+'freq_'+n);if(currUser===n){if(u.length){currUser=u[0];setCurr(currUser);updateUserUI();loadRec();}else{currUser='';setCurr('');initUser();}}renderUserModal();renderAll();}

function switchTab(id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));$(id).classList.add('active');document.querySelector(`[data-tab="${id}"]`).classList.add('active');if(id==='tabToday')renderToday();if(id==='tabUser')renderUserTab();}
document.querySelectorAll('.tab-item').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

function renderChips(){D.categoryChips.innerHTML='<button class="chip active" data-cat="全部">全部</button>'+ALL_CATS.map(c=>`<button class="chip" data-cat="${c}">${c}</button>`).join('');D.categoryChips.querySelectorAll('.chip').forEach(ch=>{ch.addEventListener('click',()=>{D.categoryChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));ch.classList.add('active');activeCat=ch.dataset.cat;D.foodSearch.value='';selFood=null;hideNutPreview();renderDropdown('');D.foodSearch.focus();});});}

// ========== 搜索下拉 ==========
function renderDropdown(filter){D.foodDropdown.innerHTML='';const s=(filter||'').toLowerCase().trim();let list=FOOD_DB;if(activeCat!=='全部')list=list.filter(f=>f.category===activeCat);if(s)list=list.filter(f=>f.name.includes(s)||f.category.includes(s));if(!list.length){D.foodDropdown.innerHTML='<div class="dd-empty">未找到匹配的食物</div>';}else{const g={};list.forEach(f=>{if(!g[f.category])g[f.category]=[];g[f.category].push(f);});Object.keys(g).forEach(cat=>{const cd=document.createElement('div');cd.className='dd-cat';cd.textContent=cat;D.foodDropdown.appendChild(cd);g[cat].forEach(food=>{const it=document.createElement('div');it.className='dd-item';if(selFood===food)it.classList.add('active');const unitInfo=food.portion?' · 1'+food.portion+'≈'+food.portionGrams+'g':'';it.innerHTML=`<span>${food.name}<span style="font-size:.72rem;color:var(--text3);margin-left:2px;">${unitInfo}</span></span><span class="dd-kcal">${food.kcal} kcal/100g</span>`;it.addEventListener('mousedown',e=>{e.preventDefault();selectFood(food);});D.foodDropdown.appendChild(it);});});}D.foodDropdown.classList.add('show');}

function selectFood(food){selFood=food;D.foodSearch.value=food.name;D.foodDropdown.classList.remove('show');updatePortionGrid(food);calcNut();}

// ========== 份量网格 ==========
function updatePortionGrid(food){
    const wrap=D.portionGrid;const sec=D.portionSection;
    if(food&&food.portion&&food.portionGrams){
        sec.style.display='block';
        const pg=food.portionGrams;
        wrap.innerHTML=`
            <button class="portion-btn" data-w="${Math.round(pg/2)}" onclick="portionQuickAdd(${Math.round(pg/2)})">
                <span class="main">半${food.portion}</span><span class="sub">≈ ${Math.round(pg/2)}g</span></button>
            <button class="portion-btn" data-w="${pg}" onclick="portionQuickAdd(${pg})">
                <span class="main">1${food.portion}</span><span class="sub">≈ ${pg}g</span></button>
            <button class="portion-btn" data-w="${pg*2}" onclick="portionQuickAdd(${pg*2})">
                <span class="main">2${food.portion}</span><span class="sub">≈ ${pg*2}g</span></button>
            <button class="portion-btn" data-w="${pg*3}" onclick="portionQuickAdd(${pg*3})">
                <span class="main">3${food.portion}</span><span class="sub">≈ ${pg*3}g</span></button>`;
        D.confirmAddBtn.style.display='none';
    }else{
        sec.style.display='none';
        D.confirmAddBtn.style.display='block';
        D.confirmAddBtn.disabled=true;
    }
    updateManualPresets(food);
}

function portionQuickAdd(grams){if(!selFood)return;D.weightInput.value=grams;confirmAdd();}

function updateManualPresets(food){
    const wrap=document.getElementById('weightPresets');
    if(food&&!food.portion){wrap.innerHTML='<button class="wt-preset" data-w="50">50g</button><button class="wt-preset" data-w="100">100g</button><button class="wt-preset" data-w="150">150g</button><button class="wt-preset" data-w="200">200g</button><button class="wt-preset" data-w="300">300g</button>';}
    wrap.querySelectorAll('.wt-preset').forEach(b=>{b.addEventListener('click',()=>{D.weightInput.value=b.dataset.w;calcNut();});});
}

// ========== 营养计算 ==========
function calcNut(){if(!selFood){hideNutPreview();return;}const w=parseFloat(D.weightInput.value);if(!w||w<=0){hideNutPreview();return;}const r=w/100;showNutPreview();D.nutKcal.textContent=(selFood.kcal*r).toFixed(1);D.nutDesc.textContent=selFood.name+' '+w+'g';D.nutProtein.textContent=(selFood.protein*r).toFixed(1);D.nutFat.textContent=(selFood.fat*r).toFixed(1);D.nutCarbs.textContent=(selFood.carbs*r).toFixed(1);D.confirmAddBtn.disabled=false;}
function showNutPreview(){D.nutPreview.classList.add('show');}
function hideNutPreview(){D.nutPreview.classList.remove('show');D.confirmAddBtn.disabled=true;}

// ========== 最近常吃 ==========
function renderRecentFoods(){
    const foods=getRecentFoods(currUser,6);
    if(foods.length===0){D.recentRow.innerHTML='<div class="recent-none">多记录几次后，这里会出现你常吃的食物</div>';return;}
    D.recentRow.innerHTML=foods.map(f=>{
        const sub=f.portion?'1'+f.portion+' '+f.portionGrams+'g':'100g';
        return`<button class="recent-pill" onclick="recentQuickAdd('${f.name}')">
            <span class="name">${f.name}</span><span class="sub">${sub}</span></button>`;
    }).join('');
}

function recentQuickAdd(name){
    const food=FOOD_DB.find(f=>f.name===name);
    if(!food)return;
    selFood=food;
    D.foodSearch.value=food.name;
    updatePortionGrid(food);
    const w=food.portionGrams||100;
    D.weightInput.value=w;
    confirmAdd();
}

// ========== 添加面板 ==========
function openSheet(meal){
    currentMeal=meal||null;
    D.addSheet.classList.remove('hidden');
    D.foodSearch.value='';D.weightInput.value='';
    selFood=null;activeCat='全部';
    D.portionSection.style.display='none';
    D.confirmAddBtn.style.display='block';
    D.confirmAddBtn.disabled=true;
    hideNutPreview();
    if(meal){
        const m=MEALS.find(mm=>mm.key===meal);
        D.sheetMealLabel.textContent='添加至 '+m.icon+' '+m.label;
    }else{D.sheetMealLabel.textContent='添加食物';}
    renderRecentFoods();
    renderChips();
    updatePortionGrid(null);
    updateManualPresets(null);
    D.foodSearch.focus();
}
function closeSheet(){D.addSheet.classList.add('hidden');currentMeal=null;}

function confirmAdd(){
    if(!currUser){toast('请先选择用户');return;}
    if(!selFood){toast('请选择食物');return;}
    const w=parseFloat(D.weightInput.value);if(!w||w<=0){toast('请输入有效重量');return;}
    const r=w/100;
    const meal=currentMeal||autoMeal(nowTime());
    records.push({
        id:genId(),date:today(),time:nowTime(),meal:meal,foodName:selFood.name,weight:w,
        kcal:parseFloat((selFood.kcal*r).toFixed(1)),protein:parseFloat((selFood.protein*r).toFixed(1)),
        fat:parseFloat((selFood.fat*r).toFixed(1)),carbs:parseFloat((selFood.carbs*r).toFixed(1)),
    });
    addFreq(currUser,selFood.name);
    saveRec(currUser,records);
    closeSheet();
    renderAll();toast('已添加 '+selFood.name+' · '+w+'g');
}

// ========== 删除 ==========
function delRec(id){if(!confirm('删除这条记录？'))return;records=records.filter(r=>r.id!==id);saveRec(currUser,records);renderAll();}

// ========== 渲染 ==========
function renderAll(){renderToday();renderHistoryMini();if(currUser){D.userDisplayName.textContent=currUser;D.userAvatar.textContent=currUser[0].toUpperCase();D.userGoalDisplay.textContent=getGoal(currUser);}}

function renderToday(){
    const td=today();
    const tr=records.filter(r=>r.date===td);
    const goal=getGoal(currUser);
    const tk=tr.reduce((s,r)=>s+r.kcal,0);
    const tp=tr.reduce((s,r)=>s+r.protein,0);
    const tf_=tr.reduce((s,r)=>s+r.fat,0);
    const tc=tr.reduce((s,r)=>s+r.carbs,0);

    // 紧凑环形图
    const circ=2*Math.PI*40;const pct=Math.min(tk/goal,1.5);
    const off=circ*(1-Math.min(pct,1));
    D.ringProgress.setAttribute('stroke-dasharray',circ);
    D.ringProgress.setAttribute('stroke-dashoffset',off);
    D.ringProgress.setAttribute('stroke',tk>goal?'var(--danger)':'var(--primary)');
    D.ringCurrent.textContent=Math.round(tk);
    D.ringTarget.textContent='/'+goal;
    D.ringHint.textContent=tk>goal?'已超出 '+(tk-goal).toFixed(0)+' kcal，点击调整目标':'还差 '+(goal-tk).toFixed(0)+' kcal';

    // 营养素条
    const goalCarbs=Math.round(goal*0.55/4);
    const goalProtein=Math.round(goal*0.18/4);
    const goalFat=Math.round(goal*0.27/9);
    function mbar(cls,dCls,label,gVal,gTarget){
        const pct=Math.min(Math.round((gVal/gTarget)*100),150);
        const w=Math.max(Math.min(pct,100),3);
        return`<div class="dash-macro"><span class="dash-m-dot ${dCls}"></span><span class="dash-m-label">${label}</span><div class="dash-m-track"><div class="dash-m-fill ${dCls}${pct>100?' over':''}" style="width:${w}%"></div></div><span class="dash-m-pct">${pct}%</span></div>`;
    }
    if(tr.length>0){D.macroBars.innerHTML=mbar('p','p','蛋白质',tp,goalProtein)+mbar('f','f','脂肪',tf_,goalFat)+mbar('c','c','碳水',tc,goalCarbs);}
    else{D.macroBars.innerHTML='<div style="font-size:.7rem;color:var(--text3);">添加食物后<br>自动分析</div>';}

    // 餐次卡片
    const mealData={};
    MEALS.forEach(m=>{mealData[m.key]={kcal:0,recs:[]};});
    tr.forEach(r=>{const meal=r.meal||autoMeal(r.time);if(mealData[meal]){mealData[meal].recs.push(r);mealData[meal].kcal+=r.kcal;}});

    D.mealCards.innerHTML=MEALS.map(m=>{
        const md=mealData[m.key];
        let bodyHTML='';
        if(md.recs.length===0){
            bodyHTML=`<span class="meal-empty">还没有记录</span><button class="meal-add" data-meal="${m.key}">+ 添加</button>`;
        }else{
            bodyHTML=md.recs.map(r=>`<span class="meal-tag" onclick="if(confirm('删除 ${r.foodName}？')){delRec('${r.id}')}" title="点击删除">${r.foodName} · ${r.weight}g<span class="meal-tag-x">×</span></span>`).join('');
            bodyHTML+=` <button class="meal-add" data-meal="${m.key}">+ 添加</button>`;
        }
        return`<div class="meal-card" style="border-left:4px solid ${m.color};">
            <div class="meal-hd"><div class="meal-hd-left"><span class="meal-icon">${m.icon}</span><span class="meal-label">${m.label}</span></div><span class="meal-kcal">${md.kcal.toFixed(0)} kcal</span></div>
            <div class="meal-body">${bodyHTML}</div>
        </div>`;
    });

    // 绑定餐次添加按钮事件
    D.mealCards.querySelectorAll('.meal-add').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();openSheet(b.dataset.meal);});});

    // 点击仪表盘设定目标
    document.getElementById('dashboardRow').onclick=openGoalModal;
}

function renderHistoryMini(){
    const td=today();const g={};
    records.forEach(r=>{if(r.date===td)return;if(!g[r.date])g[r.date]=[];g[r.date].push(r);});
    const dates=Object.keys(g).sort().reverse();
    if(!dates.length){D.historyEmptyMini.classList.remove('hidden');D.historyListMini.innerHTML='';return;}
    D.historyEmptyMini.classList.add('hidden');
    D.historyListMini.innerHTML=dates.slice(0,30).map(d=>{
        const rs=g[d];const tk=rs.reduce((s,r)=>s+r.kcal,0);
        return`<div class="hist-day"><div class="hist-day-hd" onclick="this.parentElement.classList.toggle('open')"><span class="hist-date">${dateLabel(d)}</span><div class="hist-sum"><span>${rs.length}项 · ${tk.toFixed(0)}kcal</span><span class="hist-arrow">&#9660;</span></div></div><div class="hist-day-bd">${rs.map(r=>`<div class="hist-row"><span class="hi-time">${r.time}</span><span class="hi-name">${r.foodName}</span><span class="hi-w">${r.weight}g</span><span class="hi-k">${r.kcal} kcal</span></div>`).join('')}</div></div>`;
    }).join('');
}

function renderUserTab(){
    if(!currUser)return;
    D.userAvatar.textContent=currUser[0].toUpperCase();
    D.userDisplayName.textContent=currUser;
    D.userGoalDisplay.textContent=getGoal(currUser);
    const p=getProfile(currUser);
    if(p){const actLabels={sedentary:'久坐不动',light:'轻度活动',moderate:'中度活动',active:'高度活动',very_active:'极高活动'};const goalLabels={lose:'减脂',maintain:'保持健康',gain:'增肌'};D.profileInfo.innerHTML=`<div style="display:flex;justify-content:center;gap:20px;margin-bottom:4px;"><span>${p.gender==='male'?'男':'女'} · ${p.age||'?'}岁</span><span>${p.height||'?'}cm · ${p.weight||'?'}kg</span></div><div style="text-align:center;color:var(--text3);font-size:.82rem;">${actLabels[p.activity]||''} · ${goalLabels[p.goal]||''}</div>`;}
    else{D.profileInfo.innerHTML='<div style="text-align:center;padding:12px;color:var(--text3);">未评估 · 点击下方开始</div>';}
    renderHistoryMini();
}

// ========== 弹窗 ==========
function openUserModal(){D.userModal.classList.remove('hidden');renderUserModal();D.newUserName.focus();}
function closeUserModal(){D.userModal.classList.add('hidden');}
function renderUserModal(){D.userList.innerHTML=getUsers().map(n=>`<div class="user-item${n===currUser?' cur':''}" onclick="switchUser('${n}')"><span>${n}</span><div style="display:flex;align-items:center;gap:8px;">${n===currUser?'<span class="user-badge">当前</span>':''}<button class="user-del" onclick="event.stopPropagation();deleteUser('${n}')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1" y="3" width="12" height="10" rx="1"/><path d="M4 3V1.5h6V3"/></svg></button></div></div>`).join('');}
function openGoalModal(){if(!getProfile(currUser)){openProfileModal();return;}D.goalModal.classList.remove('hidden');D.goalInput.value=getGoal(currUser);D.goalInput.focus();}
function closeGoalModal(){D.goalModal.classList.add('hidden');}
function saveGoal(){const g=parseInt(D.goalInput.value);if(!g||g<500||g>10000){toast('请输入500-10000之间的值');return;}saveGoal(currUser,g);closeGoalModal();renderAll();toast('每日目标已设为 '+g+' kcal');}

// ========== 事件 ==========
$('navUserBtn').addEventListener('click',openUserModal);
$('closeUserModalBtn').addEventListener('click',closeUserModal);
$('userModal').addEventListener('click',e=>{if(e.target===$('userModal'))closeUserModal();});
$('createUserBtn').addEventListener('click',createUser);
$('newUserName').addEventListener('keydown',e=>{if(e.key==='Enter')createUser();});
$('switchUserFromTab').addEventListener('click',openUserModal);
$('reAssessBtn').addEventListener('click',()=>openProfileModal(getProfile(currUser)));
$('editGoalFromUser').addEventListener('click',()=>{if(!getProfile(currUser)){openProfileModal();return;}openGoalModal();});
$('openSheetBtn').addEventListener('click',()=>openSheet(currentMeal||autoMeal(nowTime())));
$('addSheet').addEventListener('click',e=>{if(e.target===$('addSheet'))closeSheet();});
$('confirmAddBtn').addEventListener('click',confirmAdd);
$('goalModal').addEventListener('click',e=>{if(e.target===$('goalModal'))closeGoalModal();});
$('closeGoalModalBtn').addEventListener('click',closeGoalModal);
$('saveGoalBtn').addEventListener('click',saveGoal);
$('goalInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveGoal();});
$('reopenProfileBtn').addEventListener('click',()=>{closeGoalModal();setTimeout(()=>openProfileModal(getProfile(currUser)),300);});
D.foodSearch.addEventListener('focus',()=>renderDropdown(D.foodSearch.value));
D.foodSearch.addEventListener('input',()=>{selFood=null;hideNutPreview();D.portionSection.style.display='none';D.confirmAddBtn.style.display='block';renderDropdown(D.foodSearch.value);});
D.foodSearch.addEventListener('keydown',e=>{if(e.key==='Escape')D.foodDropdown.classList.remove('show');});
D.weightInput.addEventListener('input',calcNut);
D.weightInput.addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});
document.addEventListener('click',e=>{if(!D.foodSearch.contains(e.target)&&!D.foodDropdown.contains(e.target))D.foodDropdown.classList.remove('show');});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(!$('userModal').classList.contains('hidden'))closeUserModal();if(!$('goalModal').classList.contains('hidden'))closeGoalModal();if(!$('addSheet').classList.contains('hidden'))closeSheet();if(!$('profileModal').classList.contains('hidden'))closeProfileModal();}});

// ========== 身体评估 ==========
let profileGender='male',profileActivity='sedentary',profileGoal='lose',recommendedKcal=0;
function openProfileModal(existing){existing=existing||null;recommendedKcal=0;D.profileModal.classList.remove('hidden');D.setupResult.classList.remove('show');if(existing){D.pfAge.value=existing.age||'';D.pfHeight.value=existing.height||'';D.pfWeight.value=existing.weight||'';profileGender=existing.gender||'male';profileActivity=existing.activity||'sedentary';profileGoal=existing.goal||'lose';}else{D.pfAge.value='';D.pfHeight.value='';D.pfWeight.value='';profileGender='male';profileActivity='sedentary';profileGoal='lose';}document.querySelectorAll('#genderToggle .gender-opt').forEach(b=>{b.classList.toggle('active',b.dataset.g===profileGender);});document.querySelectorAll('#activityChips .goal-chip').forEach(b=>{b.classList.toggle('active',b.dataset.act===profileActivity);});document.querySelectorAll('#goalChips .goal-chip').forEach(b=>{b.classList.toggle('active',b.dataset.gl===profileGoal);});if(existing){calcTDEE();}D.pfAge.focus();}
function closeProfileModal(){D.profileModal.classList.add('hidden');}
function calcTDEE(){const age=parseInt(D.pfAge.value),height=parseInt(D.pfHeight.value),weight=parseInt(D.pfWeight.value);if(!age||!height||!weight||age<10||height<100||weight<30){recommendedKcal=0;return;}let bmr=10*weight+6.25*height-5*age;bmr+=(profileGender==='male')?5:-161;const actFactors={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};const tdee=Math.round(bmr*(actFactors[profileActivity]||1.2));const adj={lose:-500,maintain:0,gain:300};const rec=Math.max(tdee+(adj[profileGoal]||0),1200);recommendedKcal=rec;const goalLabels={lose:'减脂',maintain:'保持健康',gain:'增肌'};const actLabels={sedentary:'久坐',light:'轻度活动',moderate:'中度活动',active:'高度活动',very_active:'极高活动'};D.recKcal.textContent=rec;D.recDetail.textContent='TDEE '+tdee+' kcal · '+goalLabels[profileGoal]+' · '+actLabels[profileActivity];D.setupResult.classList.add('show');D.recKcal.dataset.value=rec;}
document.querySelectorAll('#genderToggle .gender-opt').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#genderToggle .gender-opt').forEach(x=>x.classList.remove('active'));b.classList.add('active');profileGender=b.dataset.g;calcTDEE();});});
document.querySelectorAll('#activityChips .goal-chip').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#activityChips .goal-chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');profileActivity=b.dataset.act;calcTDEE();});});
document.querySelectorAll('#goalChips .goal-chip').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('#goalChips .goal-chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');profileGoal=b.dataset.gl;calcTDEE();});});
[D.pfAge,D.pfHeight,D.pfWeight].forEach(el=>el.addEventListener('input',calcTDEE));
$('saveProfileBtn').addEventListener('click',()=>{
    const age=parseInt(D.pfAge.value),height=parseInt(D.pfHeight.value),weight=parseInt(D.pfWeight.value);
    if(!age||!height||!weight){toast('请先填写完整的身体数据');return;}
    calcTDEE();
    let rec=recommendedKcal;
    if(!rec){rec=parseInt(D.recKcal.dataset.value);}
    if(!rec){rec=parseInt(D.recKcal.textContent);}
    if(!rec||rec<500)rec=2000;
    const p={gender:profileGender,age:age,height:height,weight:weight,activity:profileActivity,goal:profileGoal};
    saveProfile(currUser,p);saveGoal(currUser,rec);
    // 关弹窗前先拿 localStorage 里确认存进去的值
    const confirmed=getGoal(currUser);
    D.ringTarget.textContent='/'+confirmed;
    D.userGoalDisplay.textContent=confirmed;
    closeProfileModal();
    renderToday();
    renderHistoryMini();
    toast('每日目标已设为 '+confirmed+' kcal');
});
$('skipProfile').addEventListener('click',()=>{closeProfileModal();});
$('profileModal').addEventListener('click',e=>{if(e.target===$('profileModal'))closeProfileModal();});

// ========== 初始化 ==========
initUser();
if(currUser && !getProfile(currUser) && records.length===0){
    setTimeout(()=>openProfileModal(),500);
}
</script>
