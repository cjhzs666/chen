<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 食物营养计算器</title>
    <style>
        /* ========== 基础重置和变量 ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --primary-light: #C8E6C9;
            --danger: #F44336;
            --danger-light: #FFEBEE;
            --bg: #F5F5F5;
            --card-bg: #FFFFFF;
            --text: #333333;
            --text-secondary: #666666;
            --text-light: #999999;
            --border: #E0E0E0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
            --kcal-color: #FF9800;
            --protein-color: #4CAF50;
            --fat-color: #F44336;
            --carbs-color: #2196F3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ========== 头部 ========== */
        .app-header {
            background: linear-gradient(135deg, #4CAF50, #66BB6A);
            color: #fff;
            padding: 20px 16px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(76,175,80,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .user-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.95rem;
        }
        .user-label { opacity: 0.9; }
        .user-name {
            font-weight: 700;
            background: rgba(255,255,255,0.25);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ========== 按钮 ========== */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); box-shadow: var(--shadow-hover); }
        .btn-outline { background: rgba(255,255,255,0.2); color: #fff; border: 1.5px solid rgba(255,255,255,0.5); }
        .btn-outline:hover { background: rgba(255,255,255,0.35); }
        .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
        .btn-block { width: 100%; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; font-size: 0.8rem; }
        .btn-danger:hover { background: var(--danger-light); }

        /* ========== 主体布局 ========== */
        .app-main {
            max-width: 700px;
            margin: 0 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ========== 卡片 ========== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            transition: box-shadow var(--transition);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .date-badge {
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: auto;
        }

        /* ========== 表单 ========== */
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group-food { flex: 2; min-width: 200px; }
        .form-group-weight { flex: 1; min-width: 120px; }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .form-group input {
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color var(--transition);
            background: #FAFAFA;
            width: 100%;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.1);
        }

        /* ========== 搜索下拉 ========== */
        .search-dropdown-wrapper { position: relative; }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 2px solid var(--primary);
            border-top: none;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            max-height: 250px;
            overflow-y: auto;
            z-index: 50;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            display: none;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            transition: background var(--transition);
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dropdown-item:hover, .dropdown-item.active { background: var(--primary-light); }
        .dropdown-item .food-kcal-hint { font-size: 0.8rem; color: var(--text-light); }
        .dropdown-empty { padding: 14px; text-align: center; color: var(--text-light); font-size: 0.9rem; }

        /* ========== 营养数值格子 ========== */
        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 12px;
        }
        .nutrition-item {
            text-align: center;
            padding: 12px 8px;
            border-radius: var(--radius-sm);
            background: #FAFAFA;
            transition: transform var(--transition);
        }
        .nutrition-item:hover { transform: scale(1.03); }
        .n-value {
            display: block;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .n-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .nutrition-item.kcal .n-value { color: var(--kcal-color); }
        .nutrition-item.protein .n-value { color: var(--protein-color); }
        .nutrition-item.fat .n-value { color: var(--fat-color); }
        .nutrition-item.carbs .n-value { color: var(--carbs-color); }

        /* ========== 预览和结果 ========== */
        .preview-box, .calc-result {
            margin-top: 16px;
            padding: 16px;
            border-radius: var(--radius-sm);
            background: #FAFFFE;
            border: 1.5px dashed #B2DFDB;
        }
        .calc-result {
            background: #F1F8E9;
            border: 2px solid #AED581;
        }
        .preview-title, .result-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .result-grid .nutrition-item { background: #fff; }

        /* ========== 表格 ========== */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .record-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 580px;
        }
        .record-table th {
            background: var(--bg);
            padding: 10px 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .record-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .record-table tbody tr { transition: background var(--transition); }
        .record-table tbody tr:hover { background: #FAFAFA; }
        .record-table tfoot td {
            font-weight: 700;
            background: #E8F5E9;
            border-top: 2px solid var(--primary);
            font-size: 0.95rem;
        }
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* ========== 历史记录 ========== */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-day {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: box-shadow var(--transition);
        }
        .history-day:hover { box-shadow: var(--shadow); }
        .history-day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #FAFAFA;
            cursor: pointer;
            font-weight: 600;
            transition: background var(--transition);
            user-select: none;
        }
        .history-day-header:hover { background: #F0F0F0; }
        .history-day-header .arrow {
            transition: transform var(--transition);
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .history-day.open .history-day-header .arrow { transform: rotate(180deg); }
        .history-day-body { display: none; padding: 0 16px 16px; }
        .history-day.open .history-day-body { display: block; }
        .history-totals {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 0;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .history-totals span { white-space: nowrap; }

        /* ========== 弹窗 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .user-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
        .user-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            font-weight: 600;
        }
        .user-list-item:hover { border-color: var(--primary); background: #F1F8E9; }
        .user-list-item.current { border-color: var(--primary); background: var(--primary-light); }
        .user-list-item .badge {
            font-size: 0.75rem;
            background: var(--primary);
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
        }
        .user-delete-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 4px;
            transition: color var(--transition);
        }
        .user-delete-btn:hover { color: var(--danger); }
        .new-user-form { display: flex; gap: 8px; }
        .new-user-form input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
        }
        .new-user-form input:focus { outline: none; border-color: var(--primary); }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 12px 28px;
            border-radius: 24px;
            font-size: 0.95rem;
            z-index: 300;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        /* ========== 工具类 ========== */
        .hidden { display: none !important; }

        /* ========== 响应式 ========== */
        @media (max-width: 480px) {
            .app-header h1 { font-size: 1.25rem; }
            .app-main { padding: 10px; gap: 12px; }
            .card { padding: 14px; }
            .form-row { flex-direction: column; gap: 8px; }
            .form-group-food, .form-group-weight { min-width: auto; }
            .nutrition-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .n-value { font-size: 1.1rem; }
            .record-table { font-size: 0.78rem; min-width: 480px; }
            .record-table th, .record-table td { padding: 6px 4px; }
            .modal { padding: 16px; }
        }
    </style>
</head>
<body>

<!-- ==================== 页面头部 ==================== -->
<header class="app-header">
    <h1>🍎 食物营养计算器</h1>
    <div class="user-bar">
        <span class="user-label">👤 当前用户：</span>
        <span id="currentUserName" class="user-name">未选择</span>
        <button id="switchUserBtn" class="btn btn-sm btn-outline">切换用户</button>
    </div>
</header>

<main class="app-main">

    <!-- ==================== 添加食物区域 ==================== -->
    <section class="card add-food-section">
        <h2 class="card-title">📝 添加食物</h2>

        <div class="form-row">
            <div class="form-group form-group-food">
                <label for="foodSearch">食物类型</label>
                <div class="search-dropdown-wrapper">
                    <input type="text" id="foodSearch" placeholder="搜索或选择食物..." autocomplete="off">
                    <div id="foodDropdown" class="dropdown-menu"></div>
                </div>
            </div>
            <div class="form-group form-group-weight">
                <label for="weightInput">重量（克）</label>
                <input type="number" id="weightInput" placeholder="例如：200" min="1" step="any">
            </div>
        </div>

        <!-- 当前选中食物的营养预览 -->
        <div id="previewBox" class="preview-box hidden">
            <div class="preview-title">📋 <span id="previewFoodName"></span>（每100克）</div>
            <div class="nutrition-grid">
                <div class="nutrition-item kcal"><span class="n-value" id="previewKcal">-</span><span class="n-label">卡路里</span></div>
                <div class="nutrition-item protein"><span class="n-value" id="previewProtein">-</span><span class="n-label">蛋白质(g)</span></div>
                <div class="nutrition-item fat"><span class="n-value" id="previewFat">-</span><span class="n-label">脂肪(g)</span></div>
                <div class="nutrition-item carbs"><span class="n-value" id="previewCarbs">-</span><span class="n-label">碳水(g)</span></div>
            </div>
        </div>

        <!-- 计算结果 -->
        <div id="calcResult" class="calc-result hidden">
            <div class="result-text">
                您输入的 <strong id="resultWeight"></strong> 克 <strong id="resultFoodName"></strong>：
            </div>
            <div class="nutrition-grid result-grid">
                <div class="nutrition-item kcal"><span class="n-value" id="resultKcal">-</span><span class="n-label">卡路里(kcal)</span></div>
                <div class="nutrition-item protein"><span class="n-value" id="resultProtein">-</span><span class="n-label">蛋白质(g)</span></div>
                <div class="nutrition-item fat"><span class="n-value" id="resultFat">-</span><span class="n-label">脂肪(g)</span></div>
                <div class="nutrition-item carbs"><span class="n-value" id="resultCarbs">-</span><span class="n-label">碳水(g)</span></div>
            </div>
            <button id="addRecordBtn" class="btn btn-primary btn-block">➕ 添加到今日记录</button>
        </div>
    </section>

    <!-- ==================== 今日汇总区域 ==================== -->
    <section class="card today-section">
        <h2 class="card-title">📊 今日汇总 <span id="todayDate" class="date-badge"></span></h2>
        <div id="todayEmpty" class="empty-state">还没有记录，快去添加今天的饮食吧！</div>
        <div id="todayContent" class="hidden">
            <div class="table-wrapper">
                <table class="record-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>食物</th>
                            <th>重量</th>
                            <th>卡路里</th>
                            <th>蛋白质</th>
                            <th>脂肪</th>
                            <th>碳水</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="todayTableBody"></tbody>
                    <tfoot id="todayTableFoot"></tfoot>
                </table>
            </div>
        </div>
    </section>

    <!-- ==================== 历史记录区域 ==================== -->
    <section class="card history-section">
        <h2 class="card-title">📅 历史记录</h2>
        <div id="historyEmpty" class="empty-state">还没有历史记录</div>
        <div id="historyList" class="history-list hidden"></div>
    </section>

</main>

<!-- ==================== 用户切换弹窗 ==================== -->
<div id="userModal" class="modal-overlay hidden">
    <div class="modal">
        <h3>👥 选择或新建用户</h3>
        <div id="userList" class="user-list"></div>
        <div class="modal-actions">
            <div class="new-user-form">
                <input type="text" id="newUserName" placeholder="输入新用户名" maxlength="20">
                <button id="createUserBtn" class="btn btn-primary">➕ 新建用户</button>
            </div>
        </div>
        <button id="closeModalBtn" class="btn btn-outline btn-block" style="margin-top:16px;">关闭</button>
    </div>
</div>

<!-- ==================== Toast 提示 ==================== -->
<div id="toast" class="toast hidden"></div>

// ==================== 数据管理 ====================
const STORAGE_KEY_USERS = 'nutritionCalcUsers';
const STORAGE_KEY_CURRENT = 'nutritionCalcCurrentUser';
const RECORDS_PREFIX = 'nutritionCalc_records_';

function getUsers() {
    const data = localStorage.getItem(STORAGE_KEY_USERS);
    return data ? JSON.parse(data) : [];
}

function saveUsers(users) {
    localStorage.setItem(STORAGE_KEY_USERS, JSON.stringify(users));
}

function getCurrentUser() {
    return localStorage.getItem(STORAGE_KEY_CURRENT) || '';
}

function setCurrentUser(name) {
    localStorage.setItem(STORAGE_KEY_CURRENT, name);
}

function getRecordsKey(username) {
    return RECORDS_PREFIX + username;
}

function getUserRecords(username) {
    const data = localStorage.getItem(getRecordsKey(username));
    return data ? JSON.parse(data) : [];
}

function saveUserRecords(username, records) {
    localStorage.setItem(getRecordsKey(username), JSON.stringify(records));
}

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getToday() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function getTime() {
    const d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

// ==================== 应用状态 ====================
let currentUser = getCurrentUser();
let selectedFood = null;
let allRecords = [];

// ==================== DOM 元素缓存 ====================
const $ = id => document.getElementById(id);

const dom = {
    currentUserName: $('currentUserName'),
    switchUserBtn: $('switchUserBtn'),
    foodSearch: $('foodSearch'),
    foodDropdown: $('foodDropdown'),
    weightInput: $('weightInput'),
    previewBox: $('previewBox'),
    previewFoodName: $('previewFoodName'),
    previewKcal: $('previewKcal'),
    previewProtein: $('previewProtein'),
    previewFat: $('previewFat'),
    previewCarbs: $('previewCarbs'),
    calcResult: $('calcResult'),
    resultWeight: $('resultWeight'),
    resultFoodName: $('resultFoodName'),
    resultKcal: $('resultKcal'),
    resultProtein: $('resultProtein'),
    resultFat: $('resultFat'),
    resultCarbs: $('resultCarbs'),
    addRecordBtn: $('addRecordBtn'),
    todayDate: $('todayDate'),
    todayEmpty: $('todayEmpty'),
    todayContent: $('todayContent'),
    todayTableBody: $('todayTableBody'),
    todayTableFoot: $('todayTableFoot'),
    historyEmpty: $('historyEmpty'),
    historyList: $('historyList'),
    userModal: $('userModal'),
    userList: $('userList'),
    newUserName: $('newUserName'),
    createUserBtn: $('createUserBtn'),
    closeModalBtn: $('closeModalBtn'),
    toast: $('toast'),
};

// ==================== Toast 提示 ====================
let toastTimer;
function showToast(msg) {
    clearTimeout(toastTimer);
    dom.toast.textContent = msg;
    dom.toast.classList.remove('hidden');
    // 重新触发动画
    dom.toast.style.animation = 'none';
    dom.toast.offsetHeight;
    dom.toast.style.animation = '';
    toastTimer = setTimeout(() => dom.toast.classList.add('hidden'), 2100);
}

// ==================== 用户管理 ====================
function initUser() {
    let users = getUsers();
    // 如果没有用户，自动创建默认用户
    if (users.length === 0) {
        users = ['默认用户'];
        saveUsers(users);
        currentUser = '默认用户';
        setCurrentUser(currentUser);
    }
    // 如果当前用户不在列表中，选第一个
    if (!users.includes(currentUser)) {
        currentUser = users[0];
        setCurrentUser(currentUser);
    }
    dom.currentUserName.textContent = currentUser;
    loadRecords();
    renderAll();
}

function loadRecords() {
    if (currentUser) {
        allRecords = getUserRecords(currentUser);
    } else {
        allRecords = [];
    }
}

function switchUser(name) {
    currentUser = name;
    setCurrentUser(name);
    dom.currentUserName.textContent = name;
    loadRecords();
    renderAll();
    closeModal();
    showToast('✅ 已切换到：' + name);
}

function createUser() {
    const name = dom.newUserName.value.trim();
    if (!name) { showToast('⚠️ 请输入用户名'); return; }
    const users = getUsers();
    if (users.includes(name)) { showToast('⚠️ 该用户已存在'); return; }
    users.push(name);
    saveUsers(users);
    dom.newUserName.value = '';
    switchUser(name);
    renderUserModal();
    showToast('🎉 用户「' + name + '」已创建');
}

function deleteUser(name) {
    if (!confirm('确定要删除用户「' + name + '」及其所有饮食记录吗？此操作不可恢复！')) return;
    let users = getUsers();
    users = users.filter(u => u !== name);
    saveUsers(users);
    // 清除该用户的记录
    localStorage.removeItem(getRecordsKey(name));
    // 如果删除的是当前用户，切换到第一个
    if (currentUser === name) {
        if (users.length > 0) {
            switchUser(users[0]);
        } else {
            // 没有用户了，创建默认用户
            currentUser = '';
            setCurrentUser('');
            initUser();
        }
    }
    renderUserModal();
    showToast('🗑️ 用户「' + name + '」已删除');
}

// ==================== 食物搜索 ====================
function renderDropdown(filterText) {
    dom.foodDropdown.innerHTML = '';
    const search = (filterText || '').toLowerCase().trim();
    let filtered = FOOD_DB;
    if (search) {
        filtered = FOOD_DB.filter(f =>
            f.name.includes(search) || f.category.includes(search)
        );
    }
    // 按分类分组
    const grouped = {};
    filtered.forEach(f => {
        if (!grouped[f.category]) grouped[f.category] = [];
        grouped[f.category].push(f);
    });

    if (filtered.length === 0) {
        dom.foodDropdown.innerHTML = '<div class="dropdown-empty">😕 未找到匹配的食物</div>';
    } else {
        Object.keys(grouped).forEach(cat => {
            const catDiv = document.createElement('div');
            catDiv.style.cssText = 'padding:6px 14px;font-size:0.75rem;font-weight:700;color:#999;text-transform:uppercase;';
            catDiv.textContent = cat;
            dom.foodDropdown.appendChild(catDiv);
            grouped[cat].forEach(food => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                if (selectedFood === food) item.classList.add('active');
                item.innerHTML = `<span>${food.name}</span><span class="food-kcal-hint">${food.kcal} kcal/100g</span>`;
                item.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    selectFood(food);
                });
                dom.foodDropdown.appendChild(item);
            });
        });
    }
    dom.foodDropdown.classList.add('show');
}

function selectFood(food) {
    selectedFood = food;
    dom.foodSearch.value = food.name;
    dom.foodDropdown.classList.remove('show');
    // 显示预览
    dom.previewBox.classList.remove('hidden');
    dom.previewFoodName.textContent = food.name;
    dom.previewKcal.textContent = food.kcal;
    dom.previewProtein.textContent = food.protein;
    dom.previewFat.textContent = food.fat;
    dom.previewCarbs.textContent = food.carbs;
    // 如果已经输入了重量，自动计算
    if (dom.weightInput.value) {
        calculateResult();
    }
    dom.weightInput.focus();
}

function calculateResult() {
    if (!selectedFood) return;
    const weight = parseFloat(dom.weightInput.value);
    if (!weight || weight <= 0) {
        dom.calcResult.classList.add('hidden');
        return;
    }
    const ratio = weight / 100;
    dom.calcResult.classList.remove('hidden');
    dom.resultWeight.textContent = weight;
    dom.resultFoodName.textContent = selectedFood.name;
    dom.resultKcal.textContent = (selectedFood.kcal * ratio).toFixed(1);
    dom.resultProtein.textContent = (selectedFood.protein * ratio).toFixed(1);
    dom.resultFat.textContent = (selectedFood.fat * ratio).toFixed(1);
    dom.resultCarbs.textContent = (selectedFood.carbs * ratio).toFixed(1);
}

function addRecord() {
    if (!currentUser) { showToast('⚠️ 请先选择用户'); return; }
    if (!selectedFood) { showToast('⚠️ 请先选择食物'); return; }
    const weight = parseFloat(dom.weightInput.value);
    if (!weight || weight <= 0) { showToast('⚠️ 请输入有效的重量'); return; }

    const ratio = weight / 100;
    const record = {
        id: generateId(),
        date: getToday(),
        time: getTime(),
        foodName: selectedFood.name,
        weight: weight,
        kcal: parseFloat((selectedFood.kcal * ratio).toFixed(1)),
        protein: parseFloat((selectedFood.protein * ratio).toFixed(1)),
        fat: parseFloat((selectedFood.fat * ratio).toFixed(1)),
        carbs: parseFloat((selectedFood.carbs * ratio).toFixed(1)),
    };

    allRecords.push(record);
    saveUserRecords(currentUser, allRecords);

    // 重置选择
    selectedFood = null;
    dom.foodSearch.value = '';
    dom.weightInput.value = '';
    dom.previewBox.classList.add('hidden');
    dom.calcResult.classList.add('hidden');

    renderAll();
    showToast('✅ 已添加「' + record.foodName + '」' + record.weight + 'g');
}

function deleteRecord(id) {
    if (!confirm('确定要删除这条记录吗？')) return;
    allRecords = allRecords.filter(r => r.id !== id);
    saveUserRecords(currentUser, allRecords);
    renderAll();
    showToast('🗑️ 记录已删除');
}

// ==================== 渲染 ====================
function renderAll() {
    renderToday();
    renderHistory();
}

function renderToday() {
    const today = getToday();
    dom.todayDate.textContent = today;
    const todayRecords = allRecords.filter(r => r.date === today);

    if (todayRecords.length === 0) {
        dom.todayEmpty.classList.remove('hidden');
        dom.todayContent.classList.add('hidden');
        return;
    }

    dom.todayEmpty.classList.add('hidden');
    dom.todayContent.classList.remove('hidden');

    // 表格内容
    dom.todayTableBody.innerHTML = todayRecords.map(r => `
        <tr>
            <td>${r.time}</td>
            <td>${r.foodName}</td>
            <td>${r.weight}g</td>
            <td style="color:var(--kcal-color);font-weight:600;">${r.kcal}</td>
            <td style="color:var(--protein-color);">${r.protein}</td>
            <td style="color:var(--fat-color);">${r.fat}</td>
            <td style="color:var(--carbs-color);">${r.carbs}</td>
            <td><button class="btn btn-danger" onclick="deleteRecord('${r.id}')" title="删除">✕</button></td>
        </tr>
    `).join('');

    // 合计行
    const totals = todayRecords.reduce((acc, r) => ({
        kcal: acc.kcal + r.kcal,
        protein: acc.protein + r.protein,
        fat: acc.fat + r.fat,
        carbs: acc.carbs + r.carbs,
    }), { kcal: 0, protein: 0, fat: 0, carbs: 0 });

    dom.todayTableFoot.innerHTML = `
        <tr>
            <td colspan="2">📋 合计（${todayRecords.length}项）</td>
            <td>-</td>
            <td style="color:var(--kcal-color);">${totals.kcal.toFixed(1)}</td>
            <td style="color:var(--protein-color);">${totals.protein.toFixed(1)}</td>
            <td style="color:var(--fat-color);">${totals.fat.toFixed(1)}</td>
            <td style="color:var(--carbs-color);">${totals.carbs.toFixed(1)}</td>
            <td></td>
        </tr>
    `;
}

function renderHistory() {
    // 按日期分组（排除今天）
    const today = getToday();
    const grouped = {};
    allRecords.forEach(r => {
        if (r.date === today) return;
        if (!grouped[r.date]) grouped[r.date] = [];
        grouped[r.date].push(r);
    });

    const dates = Object.keys(grouped).sort().reverse();

    if (dates.length === 0) {
        dom.historyEmpty.classList.remove('hidden');
        dom.historyList.classList.add('hidden');
        return;
    }

    dom.historyEmpty.classList.add('hidden');
    dom.historyList.classList.remove('hidden');

    dom.historyList.innerHTML = dates.map(date => {
        const records = grouped[date];
        const totals = records.reduce((acc, r) => ({
            kcal: acc.kcal + r.kcal,
            protein: acc.protein + r.protein,
            fat: acc.fat + r.fat,
            carbs: acc.carbs + r.carbs,
        }), { kcal: 0, protein: 0, fat: 0, carbs: 0 });

        const rowsHtml = records.map(r => `
            <tr>
                <td>${r.time}</td>
                <td>${r.foodName}</td>
                <td>${r.weight}g</td>
                <td style="color:var(--kcal-color);font-weight:600;">${r.kcal}</td>
                <td style="color:var(--protein-color);">${r.protein}</td>
                <td style="color:var(--fat-color);">${r.fat}</td>
                <td style="color:var(--carbs-color);">${r.carbs}</td>
            </tr>
        `).join('');

        return `
            <div class="history-day" data-date="${date}">
                <div class="history-day-header" onclick="toggleHistoryDay(this)">
                    <span>📅 ${date}（${records.length}项）</span>
                    <div style="display:flex;gap:16px;align-items:center;">
                        <span style="font-size:0.85rem;color:var(--text-secondary);">
                            🔥 ${totals.kcal.toFixed(1)} kcal &nbsp; 💪 ${totals.protein.toFixed(1)}g &nbsp; 🧈 ${totals.fat.toFixed(1)}g &nbsp; 🍚 ${totals.carbs.toFixed(1)}g
                        </span>
                        <span class="arrow">▼</span>
                    </div>
                </div>
                <div class="history-day-body">
                    <div class="table-wrapper">
                        <table class="record-table">
                            <thead>
                                <tr>
                                    <th>时间</th><th>食物</th><th>重量</th><th>卡路里</th><th>蛋白质</th><th>脂肪</th><th>碳水</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="2">📋 合计</td>
                                    <td>-</td>
                                    <td style="color:var(--kcal-color);">${totals.kcal.toFixed(1)}</td>
                                    <td style="color:var(--protein-color);">${totals.protein.toFixed(1)}</td>
                                    <td style="color:var(--fat-color);">${totals.fat.toFixed(1)}</td>
                                    <td style="color:var(--carbs-color);">${totals.carbs.toFixed(1)}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function toggleHistoryDay(header) {
    const day = header.parentElement;
    day.classList.toggle('open');
}

// ==================== 弹窗 ====================
function openModal() {
    dom.userModal.classList.remove('hidden');
    renderUserModal();
    dom.newUserName.focus();
}

function closeModal() {
    dom.userModal.classList.add('hidden');
}

function renderUserModal() {
    const users = getUsers();
    dom.userList.innerHTML = users.map(name => `
        <div class="user-list-item${name === currentUser ? ' current' : ''}" onclick="switchUser('${name}')">
            <span>👤 ${name}</span>
            <div style="display:flex;align-items:center;gap:8px;">
                ${name === currentUser ? '<span class="badge">当前</span>' : ''}
                <button class="user-delete-btn" onclick="event.stopPropagation();deleteUser('${name}')" title="删除用户">🗑️</button>
            </div>
        </div>
    `).join('');
}

// ==================== 事件绑定 ====================
dom.switchUserBtn.addEventListener('click', openModal);
dom.closeModalBtn.addEventListener('click', closeModal);
dom.userModal.addEventListener('click', (e) => {
    if (e.target === dom.userModal) closeModal();
});

dom.foodSearch.addEventListener('focus', () => {
    renderDropdown(dom.foodSearch.value);
});

dom.foodSearch.addEventListener('input', () => {
    selectedFood = null;
    dom.previewBox.classList.add('hidden');
    dom.calcResult.classList.add('hidden');
    renderDropdown(dom.foodSearch.value);
});

dom.foodSearch.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        dom.foodDropdown.classList.remove('show');
        dom.foodSearch.blur();
    }
});

// 点击其他地方关闭下拉
document.addEventListener('click', (e) => {
    if (!dom.foodSearch.contains(e.target) && !dom.foodDropdown.contains(e.target)) {
        dom.foodDropdown.classList.remove('show');
    }
});

dom.weightInput.addEventListener('input', calculateResult);
dom.weightInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addRecord();
});

dom.addRecordBtn.addEventListener('click', addRecord);
dom.createUserBtn.addEventListener('click', createUser);
dom.newUserName.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') createUser();
});

// 键盘快捷键：Esc 关闭弹窗
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !dom.userModal.classList.contains('hidden')) {
        closeModal();
    }
});

// ==================== 初始化 ====================
initUser();
</script>
